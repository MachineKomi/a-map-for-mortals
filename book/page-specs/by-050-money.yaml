copy:
  eyebrow: "FORK TWO · WHAT THE STUDIES SAY ABOUT MONEY"
  title: "What money does — a sketch of the findings"
  intro:
    - "Schopenhauer's side of the fork claims that happiness rests on what one <em>is</em>, not what one has:"
  x_label: "household income (log scale)"
  y_label: "experienced well-being"
  band_label: "contested\nthreshold\n(~$100k?)"
  main_label: "most people: keeps rising"
  minority_label: "unhappiest ~15–20%: flattens"
  caption: "<b>Schematic curves — the shapes illustrate the findings' direction, not plotted data.</b> The 2023 adversarial collaboration (Killingsworth, Kahneman &amp; Mellers): experienced well-being rises with log-income for most people, with <b>no observed plateau</b>; flattening appears only for an unhappy minority, and the threshold itself is contested. Causal direction remains open — a 2024 reanalysis argues the causal reading was never earned. <b>Association, not destiny.</b>"
  outro:
    - "So the old claim survives — qualified: the association is real and rising; where it flattens is contested; and whether money <em>causes</em> the difference remains genuinely open. Neither <em>money can't buy happiness</em> nor <em>it can</em> — the honest sentence is longer."
notes: "Threshold-curve form (§6 C). The qualifier structure mirrors edges e-0011/e-0012 exactly."
