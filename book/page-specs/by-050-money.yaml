notes: "Threshold-curve form (§6 C). RE-ADJUDICATED against verified primary sources 2026-07-07 (round-3 P0-7): labels use conditional-quantile language (not 'unhappiest ~15–20%', which read a distributional result as a subgroup of people — the exact overreading Rohrer & Wenz 2024 flag); title is association language; a-0024/a-0025 re-adjudicated. DOSSIER-BACKED 2026-07-08: the empirical dossier `d-0002` (KKM 2023 / Rohrer-Wenz 2024 / Bennedsen 2024, with permitted/prohibited inferences) structurally backs a-0024 (findings) and a-0025 (synthesis), both carrying `dossier_ref: d-0002`. COMPETING-MODEL CHART 2026-07-17 (closes the owed item recorded in d-0002 and ops/adjudications/2026-07-07-gateE-by040-050.md): the figure now draws BOTH model shapes over a shared log-income axis — a solid 'flattening ~$100k' curve (KKM/Rohrer-Wenz lower-conditional-quantile reading) and a dashed 'plateau ~$200k' curve (Bennedsen 2024) — with a wide contested band spanning $100k–$200k. Both curves rise together below the band (the one permitted inference: experienced well-being tracks log-income), then diverge inside it. The figure shows the contest the caption/dossier describe instead of declaring one curve 'the' result. Schematic — model directions, never plotted data; no causal claim; the lower-quantile subtlety stays in the label, not misrepresented as a subgroup of people. See ops/adjudications/2026-07-17-by050-competing-chart.md."
