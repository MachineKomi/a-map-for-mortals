copy:
  eyebrow: "FORK THREE · TIME, THE SCARCE THING"
  title: "Two counsels for the same hour"
  intro:
    - assert: a-0017
    - editorial: "In the years when time becomes the scarce input of everything else, two counsels flatly disagree about what to do with the hour in front of you."
  columns:
    - title: "Seize the present"
      accent: pink
      quote_ref: c-0004
      rows:
        - {h: "speaks to", v: {editorial: "the postponer — the one whose real life is always scheduled for later"}}
        - {h: "trusts", v: {editorial: "today; almost nothing else"}}
        - {h: "curdles into", v: {editorial: "a life of small immediacies that never builds anything"}}
        - {h: "take it when", v: {editorial: "your plans have quietly become the place you hide"}}
    - title: "Work as if deathless"
      accent: orange
      quote_ref: c-0018
      rows:
        - {h: "speaks to", v: {editorial: "the builder — work that outlasts a season needs a horizon longer than one"}}
        - {h: "trusts", v: {editorial: "the long arc; compounding; the unfinished"}}
        - {h: "curdles into", v: {editorial: "precisely the postponement Seneca condemns"}}
        - {h: "take it when", v: {editorial: "the work is worth more than the mood of the week"}}
  caption:
