copy:
  eyebrow: "THE BUILDING YEARS · 26–45"
  title: {editorial: "How do I carry what I've taken on?"}
  intro:
    - editorial: "By now most of the big choices are behind you. A job, a place, maybe a person; debts, people who depend on you, a name others lean on. The question stops being <em>which life?</em> and quietly becomes <em>how do I carry this one?</em>"
    - editorial: "That fits some lives and not others — people get here late, or twice, or never, and the load sits differently in every pair of hands. Think of the stages as lenses, not a timetable. Five forks lay out the ground, and none of them resolves; each is a tension you'll hold, in your own proportions, for twenty years. The voices in this chapter disagree about every one — which is exactly why they're worth mapping."
  landmarks:
    - "Carrying and\nreleasing"
    - "Ambition\nand peace"
    - "Time, the\nscarce thing"
    - "The weight that\nstrengthens?"
    - "The help\nthat frees"
  caption:
    editorial: "The road through the Building Years. Each fork glyph marks a tension mapped in this chapter — <b>tendencies, never destinies</b>."
notes: "Stage opener per SPEC §8 stage 5. Journey-map form (§6 E). Migrated at Gate E (ops/adjudications/2026-07-07-gateE-by010-060.md): 'The wise disagree' re-bounded to 'the voices gathered in this chapter disagree' — a corpus-bounded claim checkable against the chapter's own pages, per Model C recurrence-language rules. Landmarks are furniture: they are the following pages' titles."
