blocks:
- type: editorial
  field: title
  chars: 34
  text: How do I carry what I've taken on?
- type: editorial
  field: intro
  chars: 234
  text: By now most of the big choices are behind you. A job, a place, maybe a person; debts, people who depend
    on you, a name others lean on. The question stops being <em>which life?</em> and quietly becomes <em>how do
    I carry this one?</em>
- type: editorial
  field: intro
  chars: 411
  text: That fits some lives and not others — people get here late, or twice, or never, and the load sits differently
    in every pair of hands. Think of the stages as lenses, not a timetable. Five forks lay out the ground, and none
    of them resolves; each is a tension you'll hold, in your own proportions, for twenty years. The voices in this
    chapter disagree about every one — which is exactly why they're worth mapping.
- type: editorial
  field: caption
  chars: 129
  text: The road through the Building Years. Each fork glyph marks a tension mapped in this chapter — <b>tendencies,
    never destinies</b>.
