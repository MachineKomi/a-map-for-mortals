  chars: 149
  text: 'The answer is a position, moved as life moves — and the ditches have more than one shape: compulsive striving,
    quiet resignation, perpetual deferral.'
- type: editorial
  field: caption
  chars: 248
  text: A trade-off spectrum in <b>equal-status colour — neither pole is the wiser one here</b>. Both are goods;
    both curdle. Where you stand is a decision that <b>tends</b> to be re-made each decade, and this corpus holds
    honest voices for every position.
