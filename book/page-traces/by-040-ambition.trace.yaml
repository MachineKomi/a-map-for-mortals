- type: editorial
  field: note
  chars: 179
  text: 'Your answer is a spot on this line, and it moves as life moves — and the ditch takes more than one shape:
    driven-ness that never stops, quiet giving-up, and forever getting ready.'
- type: editorial
  field: caption
  chars: 256
  text: A trade-off, drawn in <b>equal colour — neither end is the wiser one here</b>. Both are good; both go sour
    if you overdo them. Where you stand is a call you'll <b>tend</b> to remake each decade, and this book holds
    honest voices for every spot on the line.
