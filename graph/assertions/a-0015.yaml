notes: "SELF-CORRECTION 2026-07-07 (round-3 review P0-6): the earlier version of THIS assertion was itself a false correction. It dropped the real two-month interval and claimed 'two-month' belonged to the habit-formation finding — WRONG. The Frazier 2009 abstract (doi:10.1111/j.1467-9280.2009.02381.x, fetched 2026-07-07) states the interval IS two months (Time 1 -> Time 2) and n=122 IS the trauma-exposed analytic group. The '~1,500 recruited' figure is NOT in the abstract (it was carried from the research report) and has been removed — reinstate only if primary-confirmed. The original v0.1.1 page copy ('one two-month study of 122 US students') was compressed but had the interval and n right; my 'repair' was worse than what it replaced. Full account: ops/adjudications/2026-07-07-external-review-round-3-response.md. u-0030 is verified-secondary (DOI-confirmed); the design here is now checked to the primary abstract."
