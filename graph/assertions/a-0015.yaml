id: a-0015
kind: source-summary
text: "Retrospective 'growth after trauma' corresponded poorly with measured pre-to-post change in a prospective study of US students — 122 of roughly 1,500 experienced trauma between waves (Frazier 2009; evidence grade B/C) — a measurement caution, not a verdict on every survivor's report."
claim_refs: [c-0030]
mandatory_caveats:
  - "a measurement caution, not a verdict"
prohibited_phrasings:
  - "growth is a myth"
  - "proves growth is illusory"
status: approved-for-package-01v2
adjudication_refs: ["ops/adjudications/2026-07-07-gateE-by070.md"]
prov: {minted_by: "claude-code:gateE-v1", date: 2026-07-07}
notes: "REPAIRS the v0.3 evidence line, which misstated the design ('one two-month study of 122 US students'): the report (wave-1/08-empirical §6B) records ~1,500 students with 122 experiencing trauma between waves, and the two-month figure belongs to a different finding (habit formation) entirely. Corrected against the report; u-0030 is verified-secondary (DOI-confirmed)."
