notes: 'Page-4 caption (redesign 2026-07-16). Mirrors a-0019 (page 6): marks the fork unresolved and the conditions as the book''s hypotheses, not findings. Rests on e-0023 (Qoheleth c-0011 ↔ Faust c-0022, IN_TENSION_WITH moderate — the ambition-vs-peace fork''s present-joy pole, added at adjudication) and e-0009 (Faust c-0022 ↔ readiness c-0021, IN_TENSION_WITH high — the Building-Years altitude of the effort-vs-acceptance master fork). c-0015 (Pascal) is carried as the ditch diagnosis, not a pole — consistent with the fork f-0002 design where the ditch voices (Thoreau/Pascal) enter as the wager pole''s failure_mode. The Faust framing respects a-0020''s "not counsel" gate: Faust names the wager to be warned against, not endorsed (prohibited phrasings block "Faust counsels"). The final sentence holds the book back from resolving what the fork deliberately leaves open.'
