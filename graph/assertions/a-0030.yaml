id: a-0030
kind: relation-summary
text: 'This is not striving against contentment — it is a question about your striving itself. Qoheleth''s honest labour enjoyed now and Faust''s bet on a satisfaction that never arrives are two modes of the same effort, and the ditch between them is a life spent arranging to be happy and so never being it. The book does not resolve it for you.'
