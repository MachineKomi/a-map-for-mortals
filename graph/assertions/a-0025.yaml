id: a-0025
kind: editorial-synthesis
text: "The data settle something narrow: a flat <em>money doesn't matter</em> reading fails — well-being tracks log-income. They do <b>not</b> test Schopenhauer's comparative claim that what one <em>is</em> matters more than what one <em>has</em>; nothing here weighs character or relationships against money. Where the slope flattens, and whether money <em>causes</em> it, both remain open."
