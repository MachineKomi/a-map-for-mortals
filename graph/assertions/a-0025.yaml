id: a-0025
kind: editorial-synthesis
text: 'Here''s the honest, narrow thing the studies show: <em>money doesn''t matter</em> is wrong — more money does track with feeling better. What they do <b>not</b> test is the bigger claim, Schopenhauer''s — that who you <em>are</em> matters more than what you <em>have</em>. Nobody has weighed character or friendship against a bank balance. Where the climb flattens, and whether money <em>causes</em> any of it, both remain open.'
