text: 'Where it frays, and it does: scholars still argue over how sound the hadith''s chain of transmission is — its grading is contested. Lear likely picked the thought up second-hand, through Renaissance Neo-Stoicism. And Tarfon — an exact contemporary of Epictetus in a shared Greco-Roman world where Hellenistic influence on rabbinic thought is documented in general, though not for this saying — gives us a cousin of the Stoic claim, keep working without owning the outcome, not its twin.'
