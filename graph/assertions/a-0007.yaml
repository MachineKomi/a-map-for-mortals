id: a-0007
kind: historical-interpretive
text: 'You can read it two ways, and people do. As comfort — the quiet, unremembered life still counted. Or as a quiet protest: look what the world wasted. Eliot leaves both doors open, and so will we; partly because shutting one would be presumptuous, and partly because most of us need both, on different days.'
