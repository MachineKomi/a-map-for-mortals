id: a-0024
kind: source-summary
text: In the 2023 adversarial collaboration (Killingsworth, Kahneman &amp; Mellers), every slice of measured well-being keeps climbing with income up to about $100k. Above that, the <b>lower conditional quantiles</b> stop climbing much — which is the distribution widening, <b>not an identified group of unhappy people</b> hitting a wall. Rohrer &amp; Wenz (2024) warn that reading it as a real subgroup smuggles in causal assumptions the data don't earn; Bennedsen (2024) puts the flattening nearer $200k. And it's all observational. <b>Association, not destiny.</b>
