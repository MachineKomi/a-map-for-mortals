id: a-0024
kind: source-summary
text: "The 2023 adversarial collaboration (Killingsworth, Kahneman &amp; Mellers): experienced well-being rises with log-income for most people, with <b>no observed plateau</b>; flattening appears only for an unhappy minority (~15–20%), and the threshold itself is contested — a 2024 reanalysis contests where, and whether, it exists. The data are observational, so the causal reading is contested too. <b>Association, not destiny.</b>"
claim_refs: [c-0026, c-0027]
mandatory_caveats:
  - "contested"
  - "Association, not destiny"
prohibited_phrasings:
  - "money can't buy happiness"
  - "money buys happiness"
