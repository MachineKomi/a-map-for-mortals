notes: "REPAIRS a v0.3 conflation: the caption credited 'a 2024 reanalysis' with arguing 'the causal reading was never earned', but per u-0027's notes Rohrer & Wenz 2024 contest the THRESHOLD ('not estimated in Killingsworth's data'); the causal caution belongs to the data's observational design (u-0026). Both cautions kept, correctly attributed. Figure labels on this page are editorial compressions of this assertion."
