id: a-0024
kind: source-summary
text: "In the 2023 adversarial collaboration (Killingsworth, Kahneman &amp; Mellers), all assessed quantiles of experienced well-being rise with log-income up to about $100k; above it, the <b>lower conditional quantiles</b> stop rising significantly — a widening of the distribution, <b>not an identified group of unhappy people</b>. Rohrer &amp; Wenz (2024) argue that reading it as a subgroup imports inappropriate causal assumptions; Bennedsen (2024) locates the plateau nearer $200k. The data are observational. <b>Association, not destiny.</b>"
claim_refs: [c-0026, c-0027]
mandatory_caveats:
  - "lower conditional quantiles"
  - "not an identified group of unhappy people"
  - "Association, not destiny"
prohibited_phrasings:
  - "money can't buy happiness"
  - "money buys happiness"
  - "the unhappiest"
status: approved-for-package-02v1
