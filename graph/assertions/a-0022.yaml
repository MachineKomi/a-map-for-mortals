notes: 'Close to c-0011''s adjudicated wording. The v0.3 flourish ''because nothing lasts, not despite it'' was DROPPED at Gate E: the held verse (Eccl 2:24, KJV wording) does not carry the causal clause, so the because-reading is not store-grounded. The prohibited phrasing guards the hedonist misquote conflation (that phrase is Isaiah 22:13/1 Cor 15:32 territory, not this verse).'
