notes: "Report label: verified (Sandars in copyright). Character speech: Siduri the tavern-keeper counsels Gilgamesh mid-quest; report gives no endorsement label — set complicated: Gilgamesh rejects the advice in scene, but the epic's failed immortality quest arguably vindicates it. Editorial provenance flag (per report): this speech survives in the Old Babylonian version and is largely absent from the Standard Babylonian recension. Sandars is a prose 'version' and in copyright; PD fallback Muss-Arnolt 1901. Report's register 'poem/principle' narrowed to poem. Era approximate (OB ~1800 BCE). Convergence with Ecclesiastes 2:24 eat-drink-joy motif is lineage-suspect, partly NOT independent (report CONV-1)."
