notes: "Report label: probable. GATE C REPAIR (2026-07-07, adjudicated via fresh-context tie-break — see ops/audits/2026-07-07-gateC-results.md): paraphrase re-subjected to the proverb; endorsement set 'undercut' (Sandys' sentence disparages the merely prudential reading); attribution_confidence re-derived 'attested'→'communal' to match the sibling proverb units — the wisdom is the communal proverb, Sandys is its first-attestation locator, retained in source. ATTESTATION CAVEAT: Sandys is the FIRST ATTESTATION of the phrase, not its author-as-endorser — his sentence embeds it in a critical clause ('Our grosse conceipts, who think honestie the best policie'), so the 1599 context arguably disparages the merely prudential reading; the proverb 'honesty is the best policy' itself circulates communally in English. Register discipline: quotation is a literary attestation; the unit's wisdom is the proverb it attests. DILEMMA POLE: honesty pole of fork honesty-vs-tact — report reconciliation principle: whether truth's benefit outweighs relational harm determines the pole. Cross-cultural weighting (report): the tact/face-saving counter-pole is proverbially weak in English but strong in East Asian traditions — a genuine weighting difference, so corpus frequency must not be read as global frequency. Life_stages: report 'all', rendered as five. Cultivates honesty/integrity; guards against deceit and the web-of-lies."
