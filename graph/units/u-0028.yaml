notes: "Report finding F11. Evidence grade C (small original observational study; meta-analytic synthesis). Replication status: original's exact procedure not directly replicated; broadly corroborated by Singh et al. 2024 systematic review/meta-analysis (20 studies, 2,601 participants — medians 59-66 days, means 106-154 days, individual variability 4-335 days; report links https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11641623/). Effect size as reported: median 66 days to reach 95% of the automaticity asymptote, range 18-254 days (96 volunteers, 82 analysable, model fit for 62); no CI given. Caveats: the real finding is high variability, not the point estimate; contradicts the '21 days' myth. UK/Western sample (WEIRD). Paper title and journal confirmed at DOI level 2026-07-06 (Crossref: Eur J Soc Psychol 40, 998-1009; online-first 2009, print issue 40(6) 2010 — cited as 2010 per convention) — match as minted. Singh et al. 2024 corroboration figures also confirmed against PMC11641623 (Healthcare (Basel); 20 studies, 2,601 participants, medians 59-66 days, means 106-154 days, variability 4-335 days). No verbatim quotation held; paraphrase only."
