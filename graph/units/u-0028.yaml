notes: "Report finding F11. Evidence grade C (small original observational study; meta-analytic synthesis). Replication status: original's exact procedure not directly replicated; broadly corroborated by Singh et al. 2024 systematic review/meta-analysis (20 studies, 2,601 participants — medians 59-66 days, means 106-154 days, individual variability 4-335 days; report links https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11641623/). Effect size as reported: median 66 days to reach 95% of the automaticity asymptote, range 18-254 days (96 volunteers, 82 analysable, model fit for 62); no CI given. Caveats: the real finding is high variability, not the point estimate; contradicts the '21 days' myth. UK/Western sample (WEIRD). Paper title and journal supplied from standard bibliographic knowledge (report cites author-year only); confirm at DOI-level check. No verbatim quotation held; paraphrase only."
