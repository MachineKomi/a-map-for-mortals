notes: "Report finding F13 (report confidence: grade-B for the attenuation finding; extract replication label: contested). Evidence grade B — large conceptual replication, far larger and more diverse than Mischel's original. Effect sizes as the report gives them: among children of mothers without college degrees, each additional minute waited at age 4 predicted only ~0.1 SD gain in age-15 achievement — about half the original bivariate correlation, and reduced by roughly two-thirds once family background, early cognitive ability, and home environment were controlled; most predictive value came from waiting at least ~20 seconds. Caveats/contestation: Sperber et al. (2024) found delay of gratification did not reliably predict adult functioning (report link https://pubmed.ncbi.nlm.nih.gov/31850833/); defenders note censoring may bias correlations toward zero — hence conditionality: contested. Report relation: QUALIFIES/CONTRADICTS 'delay gratification and you'll succeed'; contrast the Dunedin self-control gradient (F9/u-0168), which survives sibling controls. US sample. Re-derivation: extract typed this Insight; minted as Consequence per S1 rule 8. No verbatim quotation held; paraphrase only."
