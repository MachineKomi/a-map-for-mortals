notes: "Report label: verified. THE AESOP ADDED-MORALS CAVEAT (report Key Finding 2): morals attached to Aesop are frequently later editorial epimythia — per-fable rule: tag STORY and MORAL with SEPARATE attribution_confidence whenever an Aesop fable is minted. L'Estrange (1692) appended morals the Greek lacked (e.g. Perry 190, 'The Wolf and the Raven'); the 'grasshopper' of ant-and-grasshopper is a cicada/cricket in the Greek. Scholarly standard is the Perry Index (~584 core entries). Quoted wording is the reviewer's (BMCR 98.5.16), evidencing Perry/Daly editorial practice — a meta-scholarly unit, not a fable itself. Perry 1952 and BMCR in copyright; L'Estrange 1692 and Croxall PD for fable texts."
