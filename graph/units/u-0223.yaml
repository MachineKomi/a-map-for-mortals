notes: "RECORD-ONLY (CARE): content deliberately not extracted; sacred/restricted. Report label: communal. This stub records existence and scope only: the Dreaming is place-based and access-restricted; do not decontextualise. NOT pan-Aboriginal-homogeneous — Warlpiri Jukurrpa/Tjukurrpa; Arrernte, Tiwi, Wiradjuri conceptions diverge (some hold it as past reality, others as concurrent past/present/future) — conditionality conditional because per-nation variation is constitutive. The English term 'the Dreaming' was coined by Frank Gillen (1896), popularised via Spencer & Gillen (1899); Stanner's 1956 essay 'The Dreaming' is a key in-copyright reference. Translation loss: the communities attest the concept resists English glossing."
