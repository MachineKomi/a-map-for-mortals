notes: "Report finding F7. FAILED REPLICATION — minted as a Danger-type cautionary exhibit per P4 instruction (report confidence: grade-E/D; extract replication label: failed). Evidence grade E/D. Replication status: a registered replication report (Aknin et al., 2020) and a close replication (N = 133, 2022) failed to find a significant difference on broad well-being measures, though narrower happiness measures showed effects in the original direction. Effect sizes as the report gives them: original significant (N = 46, random assignment to spend a windfall on others vs self); replications null on broad measures — no numeric effect sizes stated. Caveats: small original sample; 'the robust effect is much weaker than the famous original implied' is the report's own verdict; Western samples. Report relation: QUALIFIES/CONTRADICTS 'give to be happy'; Tier-2 recommendation downgrades it to 'a mild nudge, not a reliable lever'. Re-derivation: extract typed this Insight; minted as Danger (cautionary exhibit); conditionality: contested because narrower measures still point in the original direction. No verbatim quotation held; paraphrase only."
