notes: "CONSENT GATE: do not publish before a community-source consent audit (see ops/DECISIONS.md 2026-07-07). Report confidence: communal. The term ayni is Quechua/Aymara; the held formula 'hoy por ti, mañana por mí' is the Spanish folk rendering as given by the report — hence language: es. Context: core to the ayllu (community) and communal labour (minka); reciprocity extends to Pachamama and the apus. Attesting institution per report: Smithsonian National Museum of the American Indian — 'Ayni is a core value that has served generations of Andean people since pre-Inka times.' Named in the candidate reciprocity/relationality convergence — hypothesis only, recurrence ≠ proof. Counter-evidence held per report §E: Krech, The Ecological Indian (Norton, 1999) — tendencies, not destinies."
