notes: "CRITICAL -- PRESERVE DISSENT. The chief objection to Wolf's objective component: who decides 'objective attractiveness'? Wolf's own answer is deliberately modest/intersubjective (roughly, what many people over long spans have valued), which critics (Metz; SEP 'The Meaning of Life'; Arpaly; Koethe) find either too thin, potentially elitist, or under-defended. type critique -> Danger; claim_type normative (meta-level dispute) -> normative; polarity critical -> cautionary; conditionality contested. Guards against covert elitism and unexamined relativism. Do NOT blend into SM-16."
