notes: "Speaker: FAUST, to Mephistopheles, setting the terms of his wager/pact — he loses only if a moment so satisfies him that he wants it to stay. These are pact-terms spoken in dramatic crisis, not authorial doctrine. Endorsement 'complicated' per report: Faust is ultimately SAVED, not damned, in Part Two, so the drama complicates the wager's apparent logic. English shown is Bayard Taylor (1870, public-domain); Anna Swanwick (1850) is an alternative PD translation; Kaufmann (1961), Arndt (1976) and Luke (1987) are in-copyright translations. Cross-references the separate Nietzsche prompt (striving/self-overcoming). Report gave attribution_confidence 'verified'; recorded here as 'attested' pending our own primary-edition check."
