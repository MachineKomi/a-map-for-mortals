paraphrase: "Faust stakes his soul on the terms of a wager: to wish any single moment to linger forever would be to forfeit his striving self — contentment as ruin."
quotation: "Werd’ ich zum Augenblicke sagen: / Verweile doch! du bist so schön! / Dann magst du mich in Fesseln schlagen, / Dann will ich gern zugrunde gehn! / Dann mag die Totenglocke schallen, / Dann bist du deines Dienstes frei, / Die Uhr mag stehn, der Zeiger fallen, / Es sei die Zeit für mich vorbei!"
quotation_translation: "When thus I hail the Moment flying: / “Ah, still delay—thou art so fair!” / Then bind me in thy bonds undying, / My final ruin then declare! / Then let the death-bell chime the token. / Then art thou from thy service free! / The clock may stop, the hand be broken, / Then Time be finished unto me!"
