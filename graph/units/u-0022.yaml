paraphrase: "Faust stakes his soul on the terms of a wager: to wish any single moment to linger forever would be to forfeit his striving self — contentment as ruin."
quotation: "Werd' ich zum Augenblicke sagen: / Verweile doch! du bist so schön!"
quotation_translation: "When thus I hail the Moment flying: / 'Ah, still delay—thou art so fair!' / Then bind me in thy bonds undying, / My final ruin then declare!"
