quotation_translation: "It was Heinrich Heine who gave me the most perfect idea of what a lyrical poet could be. In vain do I search through all the kingdoms of antiquity or of modern times for anything to resemble his sweet and passionate music. He possessed that divine wickedness, without which perfection itself becomes unthinkable to me... And with what mastery he wields his native tongue!"
