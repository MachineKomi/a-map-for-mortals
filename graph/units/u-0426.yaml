notes: "Report label: concept; report confidence high. 'race to the bottom of the brain stem' is Tristan Harris's coined phrase. Former Google design ethicist; studied under B.J. Fogg; builds on Herbert Simon's information/attention scarcity (do not attribute the attention-economy concept to Harris — Simon 1971 is primary). Structural-critique pole of the meta-fork; The Social Dilemma (2020) amplified it. Some scholars caution the 'hijacking/addiction' framing outruns the addiction evidence. Report claim_type 'observational / normative' mapped to observational."
