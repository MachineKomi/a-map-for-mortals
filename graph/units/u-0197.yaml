notes: "Report label: verified. One of the four mahavakyas. Metaphysical identity claim — never empirical. CONTESTED READING (carried as conditionality: contested): Brereton/Olivelle argue the grammar does not support 'That thou art' and render 'that's how you are, Svetaketu' — a significant divergence from the Advaita reading; preserve both. Spoken by Uddalaka to his son Svetaketu within a teaching dialogue; scripture, not literary characterisation, so endorsement n/a. In-copyright modern standard: Olivelle (Oxford)."
