notes: "Report finding F20b. Evidence grade B/C (statistical review of longitudinal trajectory studies). Replication status: consistent across the 54 studies reviewed. Effect size as reported: resilience was the modal trajectory, average 65.7% across populations, 95% CI 0.616-0.698; recovery 20.8%, chronicity 10.6%, delayed onset 8.9%. Caveat: resilience (stable functioning) must be distinguished from post-traumatic 'growth', much of which may be illusory (see u-0030/F19). Sample: mixed populations. Paper title supplied from standard bibliographic knowledge (report cites author-year + journal only); confirm at DOI-level check. No verbatim quotation held; paraphrase only."
