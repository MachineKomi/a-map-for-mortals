notes: "Report finding F20b. Evidence grade B/C (statistical review of longitudinal trajectory studies). Replication status: consistent across the 54 studies reviewed. Effect size as reported: resilience was the modal trajectory, average 65.7% across populations, 95% CI 0.616-0.698; recovery 20.8%, chronicity 10.6%, delayed onset 8.9%. Caveat: resilience (stable functioning) must be distinguished from post-traumatic 'growth', much of which may be illusory (see u-0030/F19). Sample: mixed populations. Title CORRECTED at DOI-level check 2026-07-06: published title reads 'dysfunction', not 'dysregulation' as first minted from memory (Clin Psychol Rev 63: 41-55; Crossref + PMID 29902711). All trajectory percentages and CIs confirmed against the abstract. No verbatim quotation held; paraphrase only."
