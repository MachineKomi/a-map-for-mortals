notes: "Report grade: communal — kept per S1 rules (oral tradition attributed to a named people). No quotation minted: the report's original_quote field ('ese introduces the principle of individual effort, strife or struggle before the potentialities encapsulated in one's ori can be actualized') is flagged by the report itself as a PARAPHRASE of Abimbola/Gbadegesin, not a verbatim quotation — held here in notes only; copyright unknown, no verbatim quotation held. Destiny components: akunleyan/akunlegba/ayanmo; ori = inner head/destiny, ese = 'leg' (effort/struggle), iwa = character. Most scholars (Gbadegesin, Makinde, Abimbola, Oladipo) read this as soft determinism, not fatalism — destiny is conditional; hence guards against fatalism/passivity. Oluwole recovered the Ifá corpus as philosophy comparable to Socrates. Anchors the destiny-vs-effort fork; convergence candidates (candidate, not proof): Stoic fate/effort, Hindu karma-with-agency. S2 lead: Gbadegesin, African Philosophy (1991) and Abimbola on Ori/ese."
