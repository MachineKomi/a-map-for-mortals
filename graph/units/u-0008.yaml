notes: "Report label: attribution_confidence 'verified' (S1 records attested; S2 climbs; report points to Gutenberg #52263 for Twilight, Ludovici). Misattribution watchlist: the popular variant 'That which does not kill us makes us stronger' is genuine-but-variant — the 'us' form popularises Nietzsche's first-person 'me'; never source the popular wording. Translation variants: wording used is Ludovici (1911, public domain, verified — chapter titled 'Maxims and Missiles'); Common (1896) renders '...strengthens me' and titles it 'Maxims and Arrows' (report-carried, unverified this session); Hollingdale (1968) is in copyright. Conditionality preserved per the report: Nietzsche does NOT claim all suffering strengthens — Ecce Homo restricts the effect to the 'typically healthy' who 'turn serious accidents to advantage' (Brady reading: an opportunity the already-strong can exploit, not an automatic law) — hence conditional. Re-derived labels vs report: claim_type prudential (concur; a maxim from 'the military school of life', not an empirical law); polarity 'affirmative' -> 'descriptive' (states an effect, issues no command); life_domains [adversity, health, character] -> [adversity, character] ('health' enters only as the applicability condition, recorded here, not as a domain the maxim addresses); life_stages 'adulthood' -> [young-adult, adult, midlife]."
