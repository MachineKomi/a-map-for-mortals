paraphrase: "The best physician must also be a philosopher — trained in logic and natural science and bound by ethics, with contempt for money and cultivated self-control constitutive of, not incidental to, medical competence."
quotation: null   # original Greek (Ὅτι ἄριστος ἰατρὸς καὶ φιλόσοφος) not held in the report
quotation_translation: "[The doctor] must be practiced in logical theory in order to discover the nature of the body, the differences between diseases, and the indications as to treatment; he must despise money and cultivate self-control in order to stay the course. He must, therefore, know all the parts of philosophy: the logical, the physical, and the ethical."
