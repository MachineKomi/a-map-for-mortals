notes: "Report confidence: high. Phenomenological description is durable and the Experience Sampling Method (real-time pager reports) was a genuine methodological advance. BUT operationalisation is contested: flow is variously modelled as discrete vs continuous, relies heavily on self-report, is hard to distinguish from enjoyment/engagement, and causal claims are unclear. 'Flow' is a coined term. Empirical, qualified."
