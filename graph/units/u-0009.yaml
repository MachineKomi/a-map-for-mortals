notes: >-
  Report unit IS-05; report label attribution_confidence 'probable', normalised to
  'attested' pending primary verification. Grading genuinely contested: al-Tirmidhi
  called the Anas chain gharib; the early critic Yahya al-Qattan called it munkar;
  al-Albani and al-Arna'ut grade it hasan on the strength of a corroborating chain
  from 'Amr ibn Umayyah in Ibn Hibban 731. Meaning universally accepted; the popular
  'untied-Bedouin-camel' storyline is a paraphrase of this brief Q&A (see report
  misattribution watchlist). Claim_type re-derived from quoted evidence: normative
  (religious-practical prescription on how tawakkul is to be enacted; not empirical)
  — concurs with report. Era 850 approximates the 9th-c. compilation of Jami`
  at-Tirmidhi per the report; the saying itself is attributed to the 7th c.
  Copyright: report marks the Arabic text 'PD text', but the quoted English is the
  modern Darussalam translation, so the unit is flagged in-copyright for print-gate
  purposes (short quote held for research only).
