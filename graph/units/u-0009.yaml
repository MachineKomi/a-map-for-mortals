notes: >-
  Report unit IS-05; report label attribution_confidence 'probable', normalised to
  'attested' pending primary verification. Grading genuinely contested: al-Tirmidhi
  called the Anas chain gharib; the early critic Yahya al-Qattan called it munkar;
  al-Albani and al-Arna'ut grade it hasan on the strength of a corroborating chain
  from 'Amr ibn Umayyah in Ibn Hibban 731. Meaning universally accepted; the popular
  'untied-Bedouin-camel' storyline is a paraphrase of this brief Q&A (see report
  misattribution watchlist). Claim_type re-derived from quoted evidence: normative
  (religious-practical prescription on how tawakkul is to be enacted; not empirical)
  — concurs with report. Era 850 approximates the 9th-c. compilation of Jami`
  at-Tirmidhi per the report; the saying itself is attributed to the 7th c.
  Copyright: report marks the Arabic text 'PD text', but the quoted English is the
  modern Darussalam translation, so the unit is flagged in-copyright for print-gate
  purposes (short quote held for research only).
  S2 primary verification (2026-07-06): sunnah.com page fetched directly. The
  Arabic text on the page itself corroborates the contested grading above — it ends
  'qala Yahya wa-hadha `indi hadithun munkar … qala Abu `Isa wa-hadha hadithun
  gharibun min hadithi Anas', i.e. both Yahya al-Qattan's munkar judgement and
  al-Tirmidhi's gharib remark are printed in situ; the site's displayed grade is
  Hasan (Darussalam). quotation now holds the Arabic matn exactly as printed
  (ornamental quote marks omitted); quotation_translation replaced with the exact
  Darussalam text as shown on the page, including its typography ('said:"O' and
  'rely(upon Allah)' without spaces) — the previous held wording carried editorial
  glosses '[the camel]'/'[upon Allah]' not on the page; the page's trailing line
  'Other chains report similar narrations.' (rendering Tirmidhi's colophon) is not
  held. No complete public-domain English translation of Jami` at-Tirmidhi is known
  to exist; for print, either hold the PD Arabic or commission/make a fresh
  translation — the held English stays in-copyright (research only).
