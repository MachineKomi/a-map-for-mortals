paraphrase: "Trust in God (tawakkul) is enacted through taking practical means, not by forgoing them — tie the camel and rely upon God."
quotation: "قَالَ رَجُلٌ يَا رَسُولَ اللَّهِ أَعْقِلُهَا وَأَتَوَكَّلُ أَوْ أُطْلِقُهَا وَأَتَوَكَّلُ قَالَ اعْقِلْهَا وَتَوَكَّلْ"   # matn as printed on sunnah.com (site's ornamental quote marks omitted); key imperative: i'qilhā wa-tawakkal
quotation_translation: 'Anas bin Malik narrated that a man said:"O Messenger of Allah! Shall I tie it and rely(upon Allah), or leave it loose and rely(upon Allah)?" He said: "Tie it and rely(upon Allah)."'
