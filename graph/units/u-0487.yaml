notes: "Report confidence: high. Complement to the biases literature (bias = systematic directional error; noise = unwanted variability). Insurance-company noise audit: median difference between underwriters' premiums for identical cases was 55% (claims adjusters' payouts 43%) — five times the ~10% variability executives predicted. Remedies ('decision hygiene,' structured aggregation, independent judgements) are argued recommendations (prudential). 'Noise' is a coined term-of-art. Lead thread for later waves."
