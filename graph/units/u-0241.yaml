notes: "Report confidence: probable (held at attested pending primary check). TRANSMISSION (male-transmitted — central caveat): none of Hypatia's own writings survive; the quotation is a male historian's testimony ABOUT her, not her words. Her attested output (commentaries on Diophantus's Arithmetica and Apollonius's Conics; editorial work on Ptolemy's Almagest Book III) is known via the Suda, Theon's inscription, and her student Synesius's letters. Socrates Scholasticus frames her murder (415 CE) as political — the Cyril-Orestes rivalry — not doctrinal. WATCHLIST: circulating 'Synesius letters' quotes ('You alone have the power to calm the storm of my soul…') are unverified as to translator/edition with suspect letter-numbering — do not encode without Fitzgerald (1926). Re-derivation differs from report: polarity set descriptive (report: prescriptive) — the Zenos testimony is descriptive admiration; the exemplary/prescriptive force is an editorial inference. Report speaker_context carried above. Report forks: voice-vs-silence, examined-life-under-constraint. Cultivates (per report): dignity, self-possession, learning; guards against self-effacement."
