notes: "Report label: probable. Re-derivation difference: report tags polarity prescriptive, but the quoted evidence is a cautionary consequence-statement about hoarding (kept cautionary here; the generosity prescription is implicit). The muruwwa (manly virtue) ethic. Context: the ode was composed after the ~40-year War of Dāhis and al-Ghabrā (Banu ʿAbs vs Banu Dhubyān, c. 560s–600s CE) and praises the peacemakers Harim ibn Sinan and al-Harith ibn ʿAwf, who paid the blood money over three years. Translator unidentified — copyright unknown; PD locators: Jones (1782), Lyall (1930); Arberry 1957 in-copyright. Pairs with Saadi's Bani Adam (u-0302) in the self-vs-community fork."
