notes: "Report label: thesis; report confidence high. MacAskill calls the premises 'not particularly controversial' but critics argue this understates disagreement (esp. population ethics). Setiya: a moral arithmetic is only as good as its axioms; the Utilitas reviewer notes the three-premise 'case' is not logically valid (the 'philosopherism' parody). NYT op-ed variant of premise 3: 'And we can make their lives better.' — use book wording for the book."
