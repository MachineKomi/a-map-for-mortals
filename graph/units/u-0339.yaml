notes: "Report label: probable — held at attested per S1 rules. Doctrine of tawakkul (trust in God); the quoted line answers the question 'should I tie my camel and trust, or leave her untied and trust?'. NORMATIVE (religious), never empirical, per the shared contract. VARIANT: the popular English form 'Trust in God, but tie your camel' reverses the hadith's clause order (tie first, then trust). Prudence pole of forks courage-vs-prudence and faith-vs-effort (report reconciliation for courage-vs-prudence: whether the risk is controllable by effort determines the pole). CONVERGENCE (preserve for edge pass): near-twins Hippocrates 'Pray to the gods, but also lend a hand yourself' and 'Call on God, but row away from the rocks' — report grades plausibly-independent (tentative): different vehicles (camel/rowing), but Mediterranean contact keeps the grade tentative. Cultivates prudence and tawakkul; guards against both fatalism and recklessness. Life_stages: report 'all', rendered as five (child excluded: counsel presumes responsibility for one's own affairs)."
