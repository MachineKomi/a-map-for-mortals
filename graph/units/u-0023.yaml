notes: "Speaker: the CHORUS of Argive elders, reflecting on Agamemnon's sacrifice of Iphigenia and the moral order of Zeus, early in the play. Greek tag: 'pathei mathos'. Endorsement 'ambiguous' per report: across the trilogy suffering does NOT reliably produce wisdom — the vengeance cycle continues — and translation is disputed (Ewans and others argue 'learn from experience' is closer than 'learn by suffering', warning against importing Christian redemptive overtones). Conditionality re-derived as 'contested' (report said 'conditional'): the chorus states it as fixed universal law, but the claim is contested both within the trilogy's action and among translators. English shown is Smyth (Loeb 1926, public-domain per report); Morshead (1881) is an alternative PD translation; Fagles (1975), Ewans and Carson are in-copyright. Report gave attribution_confidence 'verified'; recorded here as 'attested' pending our own primary-edition check."
