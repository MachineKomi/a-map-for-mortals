paraphrase: "The chorus asserts, as a law fixed by Zeus, that mortals come to wisdom through suffering."
quotation: "τὸν φρονεῖν βροτοὺς ὁδώσαντα, τὸν πάθει μάθος θέντα κυρίως ἔχειν. στάζει δ᾽ ἔν θ᾽ ὕπνῳ πρὸ καρδίας μνησιπήμων πόνος: καὶ παρ᾽ ἄκοντας ἦλθε σωφρονεῖν. δαιμόνων δέ που χάρις βίαιος σέλμα σεμνὸν ἡμένων."
quotation_translation: "Zeus, who sets mortals on the path to understanding, Zeus, who has established as a fixed law that “wisdom comes by suffering.” But even as trouble, bringing memory of pain, drips over the mind in sleep, so wisdom comes to men, whether they want it or not. Harsh, it seems to me, is the grace of gods enthroned upon their awful seats."
