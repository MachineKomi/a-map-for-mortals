notes: "Report label: verified. Pusey 1838, PD; Latin held from the report (report's Latin citation link was a WordPress blog — the CCEL link the report gives for Pusey is recorded instead). WATCHLIST (report): genuine, but the smooth modern 'our hearts are restless until they rest in You' is translation drift — the PD Pusey reads as quoted here. Metaphysical claim, never empirical. Report CONV-5: shares a Neoplatonic (Plotinus) lineage with al-Ghazali's interior turn (u-0100) — cross-pollination, NOT independent convergence. Love pole of FORK-4. Era approximate (~397-400 CE)."
