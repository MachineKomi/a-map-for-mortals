notes: "Report confidence: high. RETRACTION FLAG. The 2.9013 ratio and 11.6346 upper bound were declared invalid after Brown, Sokal & Friedman (2013, 'The Complex Dynamics of Wishful Thinking,' American Psychologist 68:801-813) debunked the Lorenz-equation basis; American Psychologist formally retracted the modelling elements. Brown et al. concluded the claim 'is entirely unfounded'; Losada declined to defend; Fredrickson conceded the maths was 'questionable' but kept a weaker 'higher positivity is generally better within bounds' claim. The RETRACTION is robust; that the precise ratio is nonsense is now settled. Model case of science self-correcting."
