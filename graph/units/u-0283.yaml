notes: >-
  Report unit ZO-04; report label attribution_confidence 'verified'. RE-DERIVATION:
  set to 'communal' here — the Yasna Haptanghaiti is an anonymous communal liturgy
  attributed to the tradition, not to Zarathustra personally (report dates it
  slightly post-Zarathustra). The humata/hūxta/hvaršta formula — 'the unifying motto
  of living Zoroastrianism' per Boyce. NOT in Insler (the YH is outside his 1975
  volume): standard authority is Narten 1986 (German); Hintze, A Zoroastrian Liturgy
  (2007) is the modern scholarly edition — report Lead #1 says get verbatim Y35.2
  from Hintze in print. Narten/EIr rendering is in-copyright; PD alternative is
  Mills, SBE 1887. Addresses the word/deed-integrity fork (report fork 7).
