notes: "Report attribution label: 'verified' (held at 'attested' pending primary check per S1 policy). Re-derivation: claim_type changed to observational (report: prudential) — the held sentence is a survey-style generalisation ('the most general survey shows us…'), not advice; the prudential programme belongs to the surrounding chapter. Quotation held only in Saunders's English; German original not captured. Report caveat: Saunders rearranged Parerga into thematic volumes — cite the Saunders volume, not a Parerga section number, for Saunders wording. The chapter's thesis is that happiness rests on what one is rather than what one has or represents; the held sentence carries the pessimist half (pain and boredom as the two foes) — paraphrase keeps both, unsoftened. Conditionality 'contested': Schopenhauer's pessimism is directly opposed by the affirmation pole (Spinoza, Emerson, Camus) per report section F."
