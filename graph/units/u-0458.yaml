notes: "Report confidence: high. EA is a LIVE movement, not consensus. 'Earning to give' was 80,000 Hours' early flagship (MacAskill's working definition: deliberate high-earning plus donating at least 20% of income); by mid-2015 the org walked it back, publishing that 'only a small proportion of people should earn to give long term.' The impact measurements (QALYs, charity effectiveness) are the EMPIRICAL part -- separable from the NORMATIVE claim that one ought to maximise. type movement -> Practice; claim_type normative; conditionality CONTESTED -> contested. Also MacAskill, Doing Good Better (2015); 80,000 Hours (founded 2011)."
