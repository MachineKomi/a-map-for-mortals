notes: "Report confidence: high. CONTESTED-FINDING FLAG / paradigm 'recurrence != proof' case. The meta-analytic null (63 conditions from 50 experiments, N=5036, mean effect 'virtually zero') is itself robust; it is the choice-overload EFFECT that is contested. Later work (Chernev, Bockenholt & Goodman 2015) identifies moderators (choice-set complexity, decision-task difficulty, preference uncertainty, decision goal). Cross-ref report 08."
