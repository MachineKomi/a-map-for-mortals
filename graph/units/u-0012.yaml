claim_id: c-0012
type: Insight
paraphrase: "The highest degree of tzedakah strengthens the poor person — by gift, loan, partnership, or work — so that they no longer need to ask for alms."
quotation: "שְׁמוֹנֶה מַעֲלוֹת יֵשׁ בַּצְּדָקָה זוֹ לְמַעְלָה מִזּוֹ. מַעֲלָה גְּדוֹלָה שֶׁאֵין לְמַעְלָה מִמֶּנָּה זֶה הַמַּחֲזִיק בְּיַד יִשְׂרָאֵל שֶׁמָּךְ וְנוֹתֵן לוֹ מַתָּנָה אוֹ הַלְוָאָה אוֹ עוֹשֶׂה עִמּוֹ שֻׁתָּפוּת אוֹ מַמְצִיא לוֹ מְלָאכָה כְּדֵי לְחַזֵּק אֶת יָדוֹ עַד שֶׁלֹּא יִצְטָרֵךְ לַבְּרִיּוֹת לִשְׁאל"   # Hebrew per Sefaria's Torat Emet 363 digital edition (Public Domain); closing Lev. 25:35 prooftext not held
quotation_translation: "There are eight levels of tzedakah, each one greater than the other. The greatest level, higher than all the rest, is to fortify a fellow Jew and give him a gift, a loan, form with him a partnership, or find work for him, until he is strong enough so that he does not need to ask others [for sustenance]."
