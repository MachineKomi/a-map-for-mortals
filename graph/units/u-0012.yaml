notes: >-
  Report unit HW-13; report label attribution_confidence 'verified (paraphrase;
  primary is PD)', normalised to 'attested'. Maimonides ranks eight degrees of
  tzedakah and the highest is to strengthen a poor person with a gift, loan,
  partnership, or work. Claim_type re-derived from quoted evidence: normative (a
  ranking of charitable duty within religious law, prescribing the highest form;
  not empirical) — concurs with report. Full ranking spans Hilkhot Mattenot Aniyim
  10:7–14; the highest degree is at 10:7. Report life_stages 'adult' mapped to
  [adult, midlife] under the schema's finer-grained enum.
  S2 primary verification (2026-07-06): Hebrew captured from Sefaria (Torat Emet
  363, Public Domain); quotation holds the halakhah minus the closing Leviticus
  25:35 prooftext. TRANSLATION IDENTIFIED AND REPLACED: the previously held
  unattributed snippet ('so that his hand will be fortified so that he will not
  have to ask others [for alms]') matches word-for-word the Eliyahu Touger
  translation (Moznaim, c1986–c2007) on Sefaria, licence CC-BY-NC — non-commercial,
  so not print-usable for a commercial book. quotation_translation now holds the
  Joseph B. Meszler 2003 translation exactly as on Sefaria (licence CC-BY —
  licensed; print-eligible with attribution). A CC0 (public-domain-dedication)
  alternative also exists on Sefaria (Sefaria Community Translation: 'The greatest
  level that has nothing above it is to strengthen the hand of a Jew who has become
  poor and give him a gift or loan or create a partnership with him or make up some
  work for him…' — contains minor typos in situ); curation may prefer it if strict
  PD wording is required. Sefaria also lists Birnbaum 1967 (licence unknown).
