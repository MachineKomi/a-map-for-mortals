notes: "CONSENT GATE: do not publish before a community-source consent audit (see ops/DECISIONS.md 2026-07-07). Report confidence: probable. A whakatauākī (proverb with known author), excerpted from a fuller saying about the harakeke (flax) and where the bellbird would sing — the full text is not held. Report gives the iwi as Ngāti Whātua; Meri Ngāroto is elsewhere commonly associated with Te Aupōuri — verify iwi at S2, do not assert either yet. DISSENT ATTACHED (report §Details/Māori): Māori scholar Hana Tapiata contests the anthropocentric reading within te ao Māori, which centres land and whakapapa — 'It is not people… It is connection, it is life.' Conditionality set to contested for that reason. Re-derivation difference: extract listed life_domain 'work'; dropped — the report gives no work/leadership context for the saying."
