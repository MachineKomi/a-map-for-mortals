paraphrase: "Personhood is not given at birth but attained: one becomes a person in proportion as one discharges the obligations of communal life, moving from the it-status of early childhood to the person-status of later years — duties primary, rights secondary."
quotation: "personhood is the sort of thing which has to be attained, and is attained in direct proportion as one participates in communal life through the discharge of the various obligations defined by one's stations… transforms one from the it-status of early childhood, marked by an absence of moral function, into the person-status of later years."
