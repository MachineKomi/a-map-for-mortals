notes: "Report finding F2 (report confidence: grade-C; extract replication label: replicated). Evidence grade C — meta-analysis of 70 studies; strong and consistent but observational. Replication status: consistent across the 70 studies reviewed; consistent with Holt-Lunstad et al. 2010 (F1/u-0032). Effect sizes as the report gives them: weighted average increased likelihood of mortality 29% for social isolation (OR = 1.29), 26% for loneliness (OR = 1.26), and 32% for living alone (OR = 1.32), after controlling for confounds; effects were stronger in samples younger than 65. Caveats: reverse causation and confounding by baseline health/SES not excluded (report 'What We Do Not Know' item 1); Western-dominant samples. Report gives venue and year but not the paper title — source.work carries the journal only. Re-derivation: life_stages widened from the extract's [adult, midlife, elder] to add young-adult, because effects were stronger in samples under 65. No verbatim quotation held; paraphrase only."
