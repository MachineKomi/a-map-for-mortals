notes: "Speaker: EDGAR (disguised), consoling his blinded, suicidal father Gloucester just after Lear and Cordelia are captured — Gloucester has said 'a man may rot even here' and refuses to move. Commonly misattributed to Lear himself; the report confirmed the speaker is Edgar against Folger, MIT and Perseus texts. Endorsement 'complicated' per report: the counsel is spoken by a son to a despairing father moments before further catastrophe, and the play's bleak ending (Cordelia's needless death) tests whether 'ripeness' is genuine consolation or stoic whistling in the dark — do not flatten into free-standing aphorism. Work date c.1605-06 (era set to 1606). S2 PRIMARY VERIFICATION (2026-07-06): matched against the Globe (1866) text at MIT Shakespeare; speaker EDGAR confirmed. Wording corrected to the Globe punctuation — comma after 'hence', semicolon after 'hither', and the line ends 'Ripeness is all: come on.' (the unit previously trimmed at 'Ripeness is all.'); the full speech opens 'What, in ill thoughts again?'. Note the Folger text was NOT checked — edition_year 1866 refers to the Globe text actually verified."
