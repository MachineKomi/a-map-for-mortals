notes: "Speaker: EDGAR (disguised), consoling his blinded, suicidal father Gloucester just after Lear and Cordelia are captured — Gloucester has said 'a man may rot even here' and refuses to move. Commonly misattributed to Lear himself; the report confirmed the speaker is Edgar against Folger, MIT and Perseus texts. Endorsement 'complicated' per report: the counsel is spoken by a son to a despairing father moments before further catastrophe, and the play's bleak ending (Cordelia's needless death) tests whether 'ripeness' is genuine consolation or stoic whistling in the dark — do not flatten into free-standing aphorism. Report gave attribution_confidence 'verified'; recorded here as 'attested' pending our own primary-edition check. Work date c.1605-06 (era set to 1606)."
