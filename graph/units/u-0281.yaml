notes: >-
  Report unit ZO-02; report label attribution_confidence 'verified', normalised to
  'attested' pending a primary check against the physical Insler 1975 volume. Insler
  1975 is in-copyright; PD alternative is Mills, SBE 1887. The most contested stanza
  in the Gathas: Insler renders xᵛafnā 'renowned to be in conflict';
  Humbach/Bartholomae render it 'dream/dream-vision'. Claim_type metaphysical, NOT
  empirical (per report and honesty contract). Conditionality 'contested': 21st-c.
  scholarship reads the dualism as ethical/psychological within a unified creation
  rather than ontological (two co-eternal substances) — the older view; how ZO-02 is
  presented depends on this unsettled question. WATCHLIST: Wikiquote versified
  'Insler' renderings of Y30.2-30.3 do not match his actual prose (report watchlist
  item 7).
