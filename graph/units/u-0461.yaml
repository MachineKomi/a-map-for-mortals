notes: "Report confidence: high. LONGTERMISM CONTESTED. Longtermism: positively influencing the long-run future is a key moral priority of our time (MacAskill's framing). Draws on Derek Parfit (future generations) and Nick Bostrom/Toby Ord (existential risk). Critics (Emile P. Torres, 'Against Longtermism,' Aeon 2021) argue it can license neglect of present, concrete suffering in favour of speculative future populations; Torres's characterisations are polemical opinion, contested by EA-aligned writers. claim_type normative; polarity contested->descriptive; conditionality CONTESTED->contested. NOTE: author is MacAskill (not Singer). MacAskill's framing sentence held back from quotation_translation (not in the S1 coined-term rid list) -- captured here and in paraphrase."
