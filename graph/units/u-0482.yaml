notes: "Report confidence: high. PERMA works well as a design/organising framework; its wellbeing-outcome claims are weaker than its popularity implies, and it is largely redundant with prior theory (e.g., self-determination theory) at the measurement layer. Best tagged as a normative/definitional proposal about what wellbeing is, not an empirical discovery. 'PERMA' is a coined acronym."
