notes: "Report finding F5. Evidence grade B. Replication status: contested — Rohrer & Wenz 2024 (PNAS) argue the $100,000 threshold 'was not estimated in Killingsworth's data but was based on Kahneman and Deaton' and that beyond $100k lower quantiles do not rise significantly; an arXiv reanalysis suggests an optimally chosen threshold yields flat well-being above ~$200,000. Effect size as reported: 15th percentile of happiness rises steeply below $100k but barely changes above it, while all other quantile regressions rise significantly with log(income); no CI given. Caveat: the original 'plateau' reflected Kahneman & Deaton's measure hitting a ceiling and effectively measuring unhappiness. US sample (WEIRD). Paper title confirmed at DOI level 2026-07-06 (PNAS 120: e2208661120; Crossref + PubMed) — matches as minted. No verbatim quotation held; paraphrase only."
