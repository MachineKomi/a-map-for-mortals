paraphrase: "In a US national online survey (N = 397), satisfying needs and wants boosted happiness but was largely irrelevant to meaning, while giving to others, self-expression, and integrating past, present, and future tracked meaning but not happiness — and higher stress and worry went with more meaning but less happiness; cross-sectional, with heavily overlapping constructs."
