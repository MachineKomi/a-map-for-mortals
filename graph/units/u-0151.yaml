notes: "Report grade: probable (held at attested per S1 rules; original label recorded). Speaker: the Chorus of Asian Bacchant women, as Pentheus, King of Thebes, resists the god Dionysus and moves toward his destruction. ENDORSEMENT=COMPLICATED — the Bacchae fiercely complicates its own lesson: Dionysus's 'wisdom' is also terrifying and cruel, and the play stages Pentheus torn apart by his own mother Agave. Greek tag: 'to sophon d' ou sophia'. TRANSLATION CAVEATS: Murray's English (PD) is interpretive — he admitted interpolating a line; the familiar literal rendering 'cleverness is not wisdom' comes from modern in-copyright translations (e.g. Arrowsmith 1959; Woodruff, Carson also flagged in-copyright by the report) and is NOT stored as the quotation. Trailing ellipsis is the report's. Report fork: pride_vs_humility; candidate convergence with Socratic ignorance (candidate, not proof)."
