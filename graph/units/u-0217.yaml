notes: "CONSENT GATE: do not publish before a community-source consent audit (see ops/DECISIONS.md 2026-07-07). Report label: communal. Oral-vs-written tension kept distinct per report: the oral tradition and the belt's meaning (c.1613) are well attested and revered, but historians dispute the authenticity of later WRITTEN versions (the Tawagonshi document). This unit records the oral tradition as carried in named community texts, NOT the disputed written artifact. Oren Lyons's gloss also in report: 'Even though you and I are in different boats, you in your boat and we in our canoe, we share the same River of Life — what befalls me, befalls you.' Conditionality conditional: a covenant between two polities, not a universal maxim."
