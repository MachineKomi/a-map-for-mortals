notes: "Report attribution label: 'verified' (held at 'attested' pending primary check per S1 policy). Re-derivation: claim_type changed to observational (report: prudential) and polarity to descriptive (report: prescriptive) — the held sentence is a moral-psychological generalisation about how conscience works ('requires often to be awakened… by the presence of the real spectator'), not itself advice; the prudential upshot (seek the discipline of real spectators) is the report's gloss on the surrounding TMS passage. Conditionality conditional ('often'). TMS first published 1759; the report cites Part III, ch. 3 per the 1790 (6th) edition, so era and edition_year are set to 1790. Report section D3: complements rather than simply contradicts the solitude pole (Schopenhauer) — both prize an inner judge but locate its training differently (strangers vs solitude)."
