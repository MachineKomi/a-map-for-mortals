notes: "Report label: verified (Adams 1849, PD) — downgraded to attested per S1 rule 1 pending primary check. The normative anchor of the professional-ethics counter-pole to the strategist stream: where the strategists prize advantage, the Oath binds competence to the patient's benefit and to restraint from harm — genuinely normative (professional duty), not prudential. Authorship of the Oath is corpus-level, not Hippocrates personally — hence 'Hippocratic corpus' in the author field."
