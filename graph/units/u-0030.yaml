notes: "Report finding F19. Evidence grade B/C (prospective longitudinal + meta-analysis — per report 'the measurement critique is strong'). Replication status: contested literature — the report's What-We-Do-Not-Know list includes 'whether post-traumatic growth is real'; the measurement critique is corroborated by Gower et al. 2022 meta-analysis, which attributes the mismatch to cognitive biases. Effect size as reported: perceived growth did not correspond to actual pre-to-post change (no numeric ES/CI given); perceived growth associated with increased distress, actual growth with decreased distress. Sample: ~1,500 US students, 122 experiencing trauma between waves (US students; WEIRD flagged). Type set to Danger rather than Consequence: the unit functions as a bias warning — retrospective PTGI-style self-report is an epistemic trap that inflates 'suffering makes you grow'. Distinguish from genuine resilience (see u-0031). Paper title confirmed at DOI level 2026-07-06 (Psychol Sci 20(7): 912-919; Crossref + PubMed) — matches as minted; n = 122 confirmed in abstract. The '~1,500 US students' baseline figure is carried from the wave-1 report (abstract states only 'undergraduate students'), not independently re-checked. No verbatim quotation held; paraphrase only."
