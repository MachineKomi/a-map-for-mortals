notes: "Speaker: the NARRATOR, closing the novel's account of Dorothea Brooke, whose idealism never found an 'epic' outlet. Endorsement 'endorsed' per report, but its tension note preserves real ambiguity: the melancholy of 'unvisited tombs' and the Finale's earlier lament that Dorothea's 'full nature ... spent itself in channels which had no great name on the earth' leave the sentence poised between consolation and quiet protest at a society that wasted her — Eliot preserves both; keep that double reading. Claim_type/polarity re-derived as observational/descriptive (report said normative/prescriptive): the sentence is a hedged causal claim ('partly dependent', 'half owing'), not a command — its normative force is implied, not stated. S2 PRIMARY VERIFICATION (2026-07-06): matched verbatim against PG #145 and confirmed as the novel's final sentence; quotation extended to the full sentence (it previously began mid-sentence at 'for the growing good...' — the sentence opens 'But the effect of her being on those around her was incalculably diffusive:')."
