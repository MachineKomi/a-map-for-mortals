notes: "Speaker: the NARRATOR, closing the novel's account of Dorothea Brooke, whose idealism never found an 'epic' outlet. Endorsement 'endorsed' per report, but its tension note preserves real ambiguity: the melancholy of 'unvisited tombs' and the Finale's earlier lament that Dorothea's 'full nature ... spent itself in channels which had no great name on the earth' leave the sentence poised between consolation and quiet protest at a society that wasted her — Eliot preserves both; keep that double reading. Claim_type/polarity re-derived as observational/descriptive (report said normative/prescriptive): the sentence is a hedged causal claim ('partly dependent', 'half owing'), not a command — its normative force is implied, not stated. Report gave attribution_confidence 'verified'; recorded here as 'attested' pending our own primary-edition check."
