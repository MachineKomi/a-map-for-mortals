notes: "Report label: estimate; report confidence high. Empirical but a SUBJECTIVE BAYESIAN estimate under deep uncertainty — heavily caveated by Ord ('right order of magnitude, not a precise probability'). The single most-cited and most-contested number in the field. Per-risk: unaligned AI ~1 in 10; engineered pandemics ~1 in 30; nuclear/climate ~1 in 1,000; total natural ~1 in 10,000. Critics (Thorstad, Fodor) argue several figures are too high."
