notes: "Report confidence: high. EFFECTS ARE SMALL, not the large effects popularisation implies. White, Uttl & Holder (2019, PLOS ONE) re-analysis found that after correcting for small-sample bias, positive-psychology-intervention effects on wellbeing are small (and effects on depression variable/often non-significant); the two earlier meta-analyses reported wellbeing effects of r = .29 (Sin & Lyubomirsky 2009) and r = .17 (Bolier et al. 2013). Cross-cultural gratitude meta-analysis (PNAS, 145 papers, N~24,804): small pooled effect (Hedges' g = 0.19). Cross-ref report 08; FLAG FOR MERGE."
