notes: "CONSENT GATE: do not publish before a community-source consent audit (see ops/DECISIONS.md 2026-07-07). Report confidence: verified. Statutory context, cited precisely: Te Awa Tupua (Whanganui River Claims Settlement) Act 2017, s14(1): 'Te Awa Tupua is a legal person and has all the rights, powers, duties, and liabilities of a legal person' (that legal fact is minted separately as the maori-te-awa-tupua unit). Related pepeha: 'Ko au te awa, ko te awa ko au' (I am the river and the river is me). Metaphysical claim of a living community — never empirical; the prescriptive edge ('the correct way to approach it') is retained. Counter-evidence held per report §E on the land-as-kin cluster: Krech, The Ecological Indian (Norton, 1999) — specific peoples altered and sometimes over-exploited environments; tendencies, not destinies. Report quote contains ellipses as received — fragmentary wording, do not complete."
