notes: "Report finding F14. Evidence grade C ('robust association across cohorts, but purpose correlates with SES, health, and social ties; an E-value analysis suggests an unmeasured confounder would need RR ~= 3 on both sides to nullify'). Replication status: replicated across cohorts (Hill & Turiano 2014; Kim/Shiba research programmes). Effect size as reported: roughly 2x all-cause mortality in the lowest vs highest life-purpose category; no CI given in the report. Sample: 6,985 US adults >50 (Health and Retirement Study) — US-only, older adults (WEIRD); life_stages restricted to midlife/elder accordingly. URL from report (PubMed Central). Paper title supplied from standard bibliographic knowledge (report cites author-year + journal only); confirm at DOI-level check. No verbatim quotation held; paraphrase only."
