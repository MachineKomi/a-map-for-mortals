notes: "Report finding F14. Evidence grade C ('robust association across cohorts, but purpose correlates with SES, health, and social ties; an E-value analysis suggests an unmeasured confounder would need RR ~= 3 on both sides to nullify'). Replication status: replicated across cohorts (Hill & Turiano 2014; Kim/Shiba research programmes). Effect size as published: HR 2.43 (95% CI 1.57-3.75) for all-cause mortality, lowest vs highest life-purpose category. DISCREPANCY NOTED at DOI-level check 2026-07-06: the wave-1 report gave 'roughly 2x' with no CI — the published HR is 2.43, so the paraphrase was tightened from 'roughly double' to 'roughly two-and-a-half times (HR 2.43)'; a rounding-down imprecision in the report, not a wrong citation. Sample: 6,985 US adults >50 (Health and Retirement Study) — US-only, older adults (WEIRD); life_stages restricted to midlife/elder accordingly. URL from report (PubMed Central). Paper title confirmed at DOI level 2026-07-06 (JAMA Netw Open 2(5): e194270; Crossref + PMC) — matches as minted. No verbatim quotation held; paraphrase only."
