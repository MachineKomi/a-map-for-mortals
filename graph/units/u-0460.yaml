notes: "CRITICAL -- MOST SENSITIVE. Present as Singer's ARGUED and WIDELY-REJECTED position, NOT as fact. Singer's preference-utilitarian account ties the wrongness of killing to a being's capacity to hold future-oriented preferences ('personhood': rationality, autonomy, self-consciousness); he argues newborns are not yet 'persons' and defends some non-voluntary euthanasia/infanticide of severely disabled infants. DISABILITY-RIGHTS DISSENT CENTRAL: Not Dead Yet (Princeton protests, 1999) and Eva Feder Kittay condemn this as ableist and an assault on human dignity. type critique -> Danger; claim_type normative (both position and critique) -> normative; polarity contested->descriptive; conditionality CONTESTED->contested. Keep dissent central -- do not blend. Also Kuhse & Singer, Should the Baby Live? (1985); Practical Ethics 1979/2011."
