notes: "Report label: high. Re-derivation: report 'empirical (evidence-based revision) + ongoing contest', 'contested' -> empirical/contested (genuine evidence-based revision -> empirical; live debate -> contested). FLAG: clearest case of a Diamond parable outrunning its evidence. 2024 Nature study (Moreno-Mayar et al., 15 ancient genomes, DOI 10.1038/s41586-024-07881-4) found no severe pre-1800s bottleneck; Malaspinas: 'a stably growing population from the 13th century through to European contact.' Diamond has defended his account; debate is live — the simple 'ecocide' story should NOT be repeated as fact. PRESERVE DISSENT. Primary citation is Hunt & Lipo (2009); cross-ref report 08."
