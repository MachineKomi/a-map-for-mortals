notes: "CRITICAL -- EFFECT ITSELF CONTESTED. Report confidence: high (that TMT exists); the mortality-salience effect is disputed. Many Labs 4 (Klein et al., Collabra: Psychology 2022, 8(1):35271) -- 17 labs, N~1,550 -- FAILED to replicate the classic worldview-defense effect; verbatim conclusion: 'we observed little evidence ... This suggests that the original finding was either a false positive or the conditions necessary to obtain it are not fully understood or no longer exist.' Chatard et al. 2020 reanalysis (>=40-per-cell) found a small effect; Haaf et al. 2020 Bayesian multiverse found fairly robust evidence for the null. TMT founder Tom Pyszczynski disputed the replication's design. DO NOT present TMT as settled. type empirical echo -> Consequence; claim_type empirical; polarity neutral->descriptive; conditionality CONTESTED -> contested."
