paraphrase: "Counsel to a would-be lover of humanity: love in action is harsh and dreadful compared with love in dreams — labour and fortitude, not the quick, admired self-sacrifice that love in dreams craves."
quotation: null   # original Russian not held; capture from a Russian primary edition in a later pass
quotation_translation: "I am sorry I can say nothing more consoling to you, for love in action is a harsh and dreadful thing compared with love in dreams. Love in dreams is greedy for immediate action, rapidly performed and in the sight of all. Men will even give their lives if only the ordeal does not last long but is soon over, with all looking on and applauding as though on the stage. But active love is labor and fortitude, and for some people too, perhaps, a complete science."
