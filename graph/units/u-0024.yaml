notes: "Speaker: Elder ZOSIMA, counselling Madame Khokhlakova, who confesses she dreams of loving humanity but could not bear ingratitude. Endorsement 'endorsed' per report — the novel endorses the teaching but dramatises its difficulty through characters who fail at it. WORDING CORRECTED AT S2 PRIMARY VERIFICATION (2026-07-06): the unit previously held P&V-style phrasing ('Active love is a harsh and fearful thing ... love in dreams thirsts for immediate action ... active love is labour and perseverance') mislabelled against a Garnett citation; it has been replaced with Garnett's exact wording from PG #28054. Note the differences: Garnett's famous first clause reads 'love in action is a harsh and dreadful thing' (not 'active love ... fearful'), and her later sentence reads 'active love is labor and fortitude' (PG #28054 prints the American spelling 'labor'; not 'labour and perseverance'). LOCATOR CONFIRMED/REFINED: the passage occurs exactly once in the novel, in Book II, ch. 4 'A Lady of Little Faith' — spoken by Zosima to Mme Khokhlakova, as the report's scene description said; a Book VI (Zosima's exhortations) citation would be wrong for these words. copyright_flag reflects the verified Garnett text, which is public-domain."
