notes: "Report confidence: high. CONTESTED IN MAGNITUDE/UNIVERSALITY. Gal & Rucker (2018) conclude 'current evidence does not support that losses, on balance, tend to be any more impactful than gains'; Simonson & Kivetz (2018) defend a moderated version. Asymmetric weighting over substantial stakes survives (Walasek, Mullett & Stewart). Best framed as contingent/moderated, not a universal law."
