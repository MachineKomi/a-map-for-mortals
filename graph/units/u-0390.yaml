notes: "Report label: dissent/problem; report confidence high. BOTH an internal AND an external critique — Bostrom himself named Pascal's mugging. Tarsney's models show the case for longtermism is robust on non-tiny probabilities under expectational reasoning, but depends on 'Pascalian' probabilities on some worldviews. Critics also raise a linguistic worry: 'human extinction' gets redefined to exclude posthuman successors. Edition_year taken from the earliest named source (Bostrom 2009)."
