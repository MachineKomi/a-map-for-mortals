notes: >-
  Report unit KH-05; report label attribution_confidence 'probable', normalised to
  'attested' pending a primary check — this is the report's one LITERAL Khayyam
  quatrain (Avery & Heath-Stubbs produced their version expressly to show how far
  FitzGerald departed). Penguin 1979 translation is IN-COPYRIGHT — print gate
  applies; no PD literal alternative named in the report. RE-DERIVATION DIFFERENCE:
  report gives polarity 'descriptive' (its canonical_claim describes the corpus's
  skepticism), but the quatrain's own quoted content is counsel ('Enjoy the
  wine...') — tagged prescriptive here. Authorship of most quatrains is
  contested/pseudepigraphic — 'Khayyam' functioned as a frame-author for later
  libertine/skeptical poets (Juan Cole); oldest dated source Bodleian MS Ouseley 140
  (Shiraz, 1460 CE, 158 quatrains); Calcutta MS (Asiatic Society No. 1548) holds
  516. Do not assert Khayyam wrote this quatrain. Convergence candidate with Attar's
  abandon-dogma valleys (AT-02) and Socratic ignorance (report convergence list).
