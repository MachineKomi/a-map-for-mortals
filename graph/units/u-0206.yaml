notes: "Report grade: verified — held at attested per S1 rules (S2 climbs). MISATTRIBUTION WATCHLIST (report §F): often quoted as an ancient African proverb; it is Mbiti's 1969 SCHOLARLY GLOSS of Afro-communitarianism, not a traditional verbatim proverb — any 'traditional proverb' attribution is dubious; verified as Mbiti. Claim_type metaphysical (constitution of identity), never empirical, per the report's explicit instruction. Report describes it as a foundational descriptive-normative statement; descriptive polarity kept with the normative freight noted. Heinemann 1969/1990 in-copyright (report source table). Report contrasts Descartes' 'I think therefore I am'. Feeds the personhood debate: Menkiti's radical (u-0207) and Gyekye's moderate (u-0208) communitarianism both depart from Mbiti's axiom."
