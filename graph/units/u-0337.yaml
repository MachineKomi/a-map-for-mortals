notes: "Report label: verified — held at attested per S1 rules. SPEAKER CONTEXT: the verse is voiced by the fowler within the tale ('…fall a prey to me') — quails escape his net by flying up in unison but perish when they quarrel; the canonical frame endorses the moral (Bodhisatta as the wise quail, Devadatta as the quarrelsome one), hence endorsement: endorsed. RE-DERIVATION: polarity cautionary (report: prescriptive) — the verse warns of what befalls quarrellers; the prescriptive content (keep concord) is implicit. Life_stages: report 'all', rendered as all six. Unity pole of fork collaboration-vs-coordination (report reconciliation: role-clarity/concord, not headcount, is the variable); cf. u-0343 (many hands), u-0344 (too many cooks). Convergence candidate with Aesop's bundle-of-sticks and folk forms — report grades it undetermined (plausibly independent, but Aesop-India cross-pollination possible); preserve for edge pass. Cultivates concord/solidarity; guards against factionalism/quarrelling."
