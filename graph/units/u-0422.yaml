notes: "Report label: counter-claim; report confidence high. Median beta ~ -0.03 to -0.05; the 'potatoes/glasses' comparison is the famous rhetorical device. Twenge/Haidt reply that six defensible analytic choices shrank a real effect (esp. for girls, ~r=0.15-0.20); Orben & Przybylski rejoin that re-running with the requested changes leaves effects still tiny and still smaller than wearing glasses. Both published; UNRESOLVED. Key skeptic unit paired with Haidt's causal claim (u-0416)."
