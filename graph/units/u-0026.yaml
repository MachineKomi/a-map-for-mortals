notes: "Report finding F4. Evidence grade B (adversarial-collaboration reanalysis; per report 'among the more credible work in the field'). Replication status: KKM 2023 reconciles Kahneman & Deaton 2010 and Killingsworth 2021 — both partly right about different people. Effect size as reported: rising slope of experienced well-being with log-income; flattening confined to roughly the unhappiest 15-20% above ~$100k; no CI given for the slope. Caveats: causal assumptions challenged (Rohrer & Wenz 2024, PNAS); log-linear means diminishing absolute returns; Easterlin paradox (macro level) unresolved. US sample (WEIRD). Paper title confirmed at DOI level 2026-07-06 (PNAS 120: e2208661120; Crossref + PubMed) — matches as minted. No verbatim quotation held; paraphrase only. Conditionality set to contested per report's 'What We Do Not Know' item 2 (how much money matters, and for whom, is unsettled)."
