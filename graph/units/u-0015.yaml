paraphrase: "We never actually live; we only hope to live, perpetually deferring life and happiness to the future."
quotation: "Ainsi nous ne vivons jamais, mais nous espérons de vivre ; et, nous disposant toujours à être heureux, il est inévitable que nous ne le soyons jamais."
quotation_translation: "So we never live, but we hope to live; and, as we are always preparing to be happy, it is inevitable we should never be so."
