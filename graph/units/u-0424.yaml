notes: "Report label: counter-claim; report confidence MEDIUM-HIGH (single-state New Jersey hospital data; not necessarily generalizable). USPSTF recommended screening adolescent girls for depression in 2011; ideation coding changed 2015-2017. Haidt counters that completed-suicide and ER self-harm data (esp. for younger girls) rose independently of coding — both partly true depending on dataset; present as genuine uncertainty. Key skeptic unit paired with Haidt's causal claim (u-0416)."
