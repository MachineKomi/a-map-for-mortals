notes: >-
  Report unit HW-12; report label attribution_confidence 'verified' (checked against
  a secondary web source, not a primary edition by this project), normalised to
  'attested' pending a primary check against Taylor 1897. Claim_type re-derived from
  quoted evidence: normative (explicit duty language — 'not thy duty… neither art
  thou free') — concurs with report. Mishnah numbering of this saying varies across
  editions (it appears as 2:15–16 or 2:20–21 in some); 2:16 follows the report.
  Era 200 approximates the Mishnah's redaction per the report ('tannaitic, ~200 CE
  redaction'); R. Tarfon was active late 1st–early 2nd c. CE. Report life_stages
  'adult' mapped to [adult, midlife] under the schema's finer-grained enum.
  S2 primary verification (2026-07-06): WORDING CORRECTED. The previously held
  English ('It is not thy duty to complete the work, but neither art thou free to
  desist from it.') is NOT Taylor's — it is the later popular rendering (cf. Hertz's
  Sayings of the Fathers, in-copyright); the report mis-credited it. Taylor 1897
  (2nd ed.) actually reads 'It is not for thee to finish the work, nor art thou
  free to desist therefrom; if thou hast learned much Thorah, they give thee much
  reward…' — the held quotation_translation is now Taylor's exact clause.
  Numbering across checked editions: Sefaria numbers the saying 2:16 (passage field
  follows this); Taylor's own edition numbers it II.19 (page header 'II. 18, 19').
  Hebrew held from Sefaria's Torat Emet 357 (Public Domain); the full mishnah
  continues with the reward clauses, English 'He [Rabbi Tarfon] used to say'
  context per Sefaria's Kulp translation (CC-BY, not held).
