notes: "Report label: verified (stored communal per S1 rule 1 — oral constitutional tradition of a people, held here in Parker's rendering). MISATTRIBUTION WATCHLIST: the popular slogan 'in every deliberation we must consider the impact on the seventh generation' is NOT in written transcriptions of the Great Law; the only 'seven' passage concerns leaders' skin being 'seven spans' thick. The seventh-generation ethic is authentically rooted in this passage but the slogan is a modern distillation — flag as tradition/paraphrase. Era given is the Parker rendering's date; the oral tradition long predates it. Parker 1916 is public domain (report; hosted by Portland State University). Report recommends cross-checking against Onondaga Nation community sources at S2."
