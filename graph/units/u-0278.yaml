notes: "Report label: verified (held at attested per S1 rule 1). IN-COPYRIGHT (Metropolitan Books, 2014, per report) — quote briefly; print gate governs the book. Report claim_type label was compound: 'normative (prudential) + empirical (cites palliative-care survival study)' — re-derived to normative (a claim about what matters at the end); the empirical strand is kept out of the claim and held here: Gawande cites a finding that early-palliative-care patients 'lived 25% longer' — treat as a REPORTED study, not Gawande's own data (report caution carried verbatim in substance). The ellipsis in the quotation is held in the report exactly as copied — do not complete. Report gloss: two courages — to face mortality, and to act on it; warns medicalised fighting can inflict 'barbaric' suffering (fighting-vs-befriending fork). Converges with Byock (u-0276) and Ware (u-0277) on completing relationships / authorship before death — robustness signal, not proof."
