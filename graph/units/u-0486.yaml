notes: "Report confidence: high. CONTESTED IN STRONG FORM. Original evidence mixed and samples small (lottery winners were slightly, non-significantly happier than controls). Lucas et al. (2003, 2004) and Diener, Lucas & Scollon (2006, 'Beyond the Hedonic Treadmill') show adaptation is NOT complete — set points are partly heritable but can shift, and events like disability and long-term unemployment leave lasting dents. Weak claim (huge external events matter less long-run than expected) survives; strong claim (full return to a fixed neutral set point) does not. Cross-ref report 08 money-wellbeing, resilience trajectories; FLAG FOR MERGE."
