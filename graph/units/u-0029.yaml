notes: "Report finding F12. Evidence grade B/A (meta-analysis of 94 independent tests, >8,000 participants). Replication status: robust meta-analytic base; later health-behaviour meta-analyses report smaller effects (d ~= 0.14-0.37 for objectively assessed behaviour). Effect size as reported: d = 0.65, 95% CI 0.60-0.70. Caveat: most studies compared against goal-intention controls rather than no-treatment. Western samples (WEIRD flagged in report). Paper title and volume supplied from standard bibliographic knowledge (report cites author-year only); confirm at DOI-level check. No verbatim quotation held; paraphrase only."
