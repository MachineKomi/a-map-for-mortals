notes: "Report finding F12. Evidence grade B/A (meta-analysis of 94 independent tests, >8,000 participants). Replication status: robust meta-analytic base; later health-behaviour meta-analyses report smaller effects (d ~= 0.14-0.37 for objectively assessed behaviour). Effect size as reported: d = 0.65, 95% CI 0.60-0.70. Caveat: most studies compared against goal-intention controls rather than no-treatment. Western samples (WEIRD flagged in report). Paper title and volume confirmed at DOI level 2026-07-06 (Crossref: Adv Exp Soc Psychol 38, 69-119) — match as minted; d = .65 and 94 tests confirmed from abstract. The 95% CI 0.60-0.70 and >8,000 participants are in-text figures carried from the wave-1 report, not independently re-checked (abstract does not state them). No verbatim quotation held; paraphrase only."
