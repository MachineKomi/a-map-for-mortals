notes: "Report label: counter-claim; report confidence high. Notes middle-aged men have far higher suicide rates than teen girls; points to alternative predictors (fatherlessness, inequality). Haidt's team (After Babel) published a detailed critique alleging coding errors in Ferguson's experiment meta-analysis that, if corrected, would flip statistical significance — CONTESTED on both methods and conclusions. Key skeptic unit paired with Haidt's causal claim (u-0416)."
