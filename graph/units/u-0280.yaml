notes: >-
  Report unit ZO-01; report label attribution_confidence 'verified', normalised to
  'attested' pending a primary check against the physical Insler 1975 volume (report
  Lead #2). Insler 1975 is in-copyright; PD alternative for print is Mills, SBE 1887.
  Insler himself called 'great retribution' (yāh) 'at best a guess'; Schmidt reads a
  decisive-contest metaphor. Boyce and Encyclopaedia Iranica treat this verse as the
  cornerstone of Zoroastrian free-will ethics — an explicit rejection of
  predestination. WATCHLIST: versified 'Insler' renderings of Y30.2-30.3 on Wikiquote
  do NOT match his actual 1975 prose (report watchlist item 7) — use only the prose
  wording held here. Anchor of the fate-vs-will fork: directly opposed by the
  fatalist strain in FitzGerald-Khayyam (u-0287), Ferdowsi's Rostam-Sohrab (u-0291),
  and Zuhayr. Convergence CANDIDATE with the project's 'truth above all' — the Gathic
  claim is normative/metaphysical, not an empirical claim about honesty's payoffs;
  flag, don't force. Asha translation is unsettled (Insler 'truth';
  Bartholomae/Mills 'righteousness / cosmic order').
