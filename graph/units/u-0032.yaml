notes: "Report finding F1 — the report's headline result. Evidence grade C ('strong and consistent but observational; reverse causation and confounding by baseline health remain'). Replication status: consistent across 148 prospective studies (308,849 participants). Effect size as reported: random-effects weighted OR = 1.50, 95% CI 1.42-1.59; strongest for complex social-integration measures (OR = 1.91, 95% CI 1.63-2.23), weakest for binary living-alone indicators (OR = 1.19, 95% CI 0.99-1.44); magnitude comparable to stopping smoking and exceeding obesity and physical inactivity. Sample: mixed/global but mostly Western (WEIRD flagged). Causal direction listed in the report's What-We-Do-Not-Know section, but the association itself is not contested — hence conditionality: conditional. Paper title confirmed at DOI level 2026-07-06 (PLoS Med 7(7): e1000316; Crossref + PLOS article page) — matches as minted; all headline and subgroup ORs confirmed. Smoking-cessation comparison is presented graphically (Figure 6) rather than as an in-text number. No verbatim quotation held; paraphrase only."
