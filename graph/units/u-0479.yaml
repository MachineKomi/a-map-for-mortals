notes: "Report confidence: high. CONTESTED-FINDING FLAG. Critiqued by Credé, Tynan & Harms (2017, 'Much Ado About Grit', JPSP 113:492-511; 584 effect sizes, 88 samples, N=66,807). Verbatim: the higher-order structure of grit 'is not confirmed', grit 'is only moderately correlated with performance and retention', and grit 'is very strongly correlated with conscientiousness' (pooled rho = .842 — near-complete overlap, a jangle fallacy). Perseverance-of-effort facet carries most of the (small) predictive value with some incremental validity over conscientiousness. Do NOT present as robust large-effect."
