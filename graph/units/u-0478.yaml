notes: "Report confidence: high. CONTESTED MEASUREMENT: the original 13-item Maximization Scale has poor psychometric properties; Diab, Gillespie & Highhouse (2008, 'Are Maximizers Really Unhappy?') found with a cleaner measure that maximisers are 'just as happy as satisficers' apart from more regret. The maximizer-unhappiness link is culturally moderated (Roets, Schwartz & Guan 2012: present in US/Western Europe, absent in China). Cross-ref report 08 (habit/decision material); FLAG FOR MERGE."
