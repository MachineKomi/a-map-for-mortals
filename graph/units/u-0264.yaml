notes: "Report label: verified. WATCHLIST (report item 6) — DUAL FRAMING: not pure autobiography; Kipling himself (Something of Myself, 1937) credited Leander Starr Jameson as the inspiration, while the paternal 'my son' address is real — addressed to John Kipling, killed at the Battle of Loos 27 Sep 1915, aged 18 (Kipling had used influence to secure the commission despite John's poor eyesight; CWGC confirmed the grave 2015). That biography loads 'rebuild with worn-out tools' with retrospective tragic irony the author could not have intended. Speaker is a Victorian-Stoic ideal, not necessarily Kipling's whole view (report assigns no literary-endorsement label). Conditionality: conditional — note the gendered address ('you'll be a Man, my son'). Claim-type: report's 'normative (prudential)' — normative chosen (an ideal of character). Copyright: report says PD (US); CHECK TERRITORY before print. Held critically: 1996 BBC poll UK's favourite poem, but Eliot judged it 'good verse but not good poetry'; Neruda dismissed it. Tension to preserve: Kipling's Stoic self-mastery vs Wallace's conscious empathy (u-0266) — rival young-adult ideals. Read-aloud register unit — simple surface kept."
