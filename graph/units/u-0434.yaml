notes: "CRITICAL -- THIN EVIDENCE BASE. Report confidence: high (that Frankl proposed these); LOW that efficacy is established. Thir & Batthyany systematic review (in Logotherapy and Existential Analysis, Springer 2016, pp. 53-74) surveyed 42 studies (2010-2015) -- base still developing. Hong et al. meta-analysis (J Psychiatr Ment Health Nurs 2025) reports positive effects but weak methodology: 4 RCTs of 19 studies, methodological heterogeneity, predominance of Korea studies limits generalisability. Pytell calls logotherapy 'authoritarian.' KEEP the philosophy of meaning (SM-01..04) DISTINCT from these clinical claims. type clinical concept -> Consequence; claim_type empirical (efficacy claim) -> empirical; polarity neutral->descriptive; conditionality contested preserved. Also in The Doctor and the Soul."
