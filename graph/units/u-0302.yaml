notes: "GATE C RERUN FIX 2026-07-07 (round-3 P0-1): `translator: Dick Davis` was likely wrong — the held English does not match Davis's known 2002 Gulistan rendering; translator cleared to null pending a Gate F wording-match. copyright_flag kept in-copyright (conservative), so no false print/PD consequence follows. FLAG FOR MERGE: overlaps the wave-1 Near-Eastern report (05); adab (practical-ethics) angle only. Textual variant (misattribution watchlist #5): banī ādam aʿzā-ye yekdīgar-and ('limbs of one another', in all early MSS) vs yek peykar-and ('one body'); the UN carpet's Persian uses yekdīgar while the English UN plaque uses Eastwick's 1880 rendering of the later yek peykar variant — do not present either as definitively original. Davis 2002 is in-copyright; PD English: Rehatsek 1888, Eastwick 1880. Provenance colour: 5m x 5m carpet installed 2005 in the North Delegates' Lounge, UN HQ; quoted by Ban Ki-moon (Tehran, 2012); first couplet on Iran's 2010 100,000-rial banknote. Convergence candidate: Stoic oikeiosis/cosmopolitanism and Golden-Rule traditions — recurrence is not proof. Endorsement: endorsed — Saadi's own moral verse within the story frame."
