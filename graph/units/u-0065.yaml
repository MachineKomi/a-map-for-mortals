paraphrase: "Discipline your contradictions into a whole — create yourself — rather than amputating what does not fit."
quotation: null   # German of Twilight §49 not held in the report
quotation_translation: "Such a spirit, become free, appears in the middle of the universe with a feeling of cheerful and confident fatalism; he believes that only individual things are bad, and that as a whole the universe justifies and, affirms itself—He no longer denies.... But such a faith is the highest Of all faiths: I christened it with the name of Dionysus."
