paraphrase: "Greatness consists in amor fati — wanting nothing in one's life, forward or backward, to be different, and loving, not merely bearing, what is necessary."
quotation: null   # German original not held in the wave-1 report; capture at primary verification
quotation_translation: "My formula for greatness in man is amor fati: the fact that a man wishes nothing to be different, either in front of him or behind him, or for all eternity. Not only must the necessary be borne, and on no account concealed, — all idealism is falsehood in the face of necessity, — but it must also be loved..."
