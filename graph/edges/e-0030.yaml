notes: "McAnany & Yoffee (Questioning Collapse, 2010) resilience counter-thesis qualifies Diamond's collapse framing: the leitmotif of the human record is resilience and reorganization as much as collapse, and 'collapse' narratives can erase the survival and agency of descendant peoples and the role of imperialism. QUALIFIES (not UNDERMINED_BY) because it re-frames rather than refutes — it guards against collapse-fatalism and survivor-erasure; no clean refutation either way. Moderate confidence: an argued multi-author re-reading, not an empirical refutation. (Diamond wrote a sharply critical Nature review without noting the book targeted his own work.)"
