notes: "Luxury trap ↔ happiness-from-within. The two claims diagnose the same error (acquisition/possession does not deliver wellbeing) from very different frames (evolutionary/behavioural mechanism vs ethical character). Downgraded to weak: the recurrence is robust as a human question but the cultural-genealogy channel is diffuse and unattested-in-corpus for this specific pairing. Stronger ancient partner would be Epicurean c-0398 ('what is good is easy to obtain'); held to c-0013 as the skeleton node."
