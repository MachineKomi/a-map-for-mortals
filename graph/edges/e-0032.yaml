notes: "Haidt's causal thesis vs the Orben & Przybylski 2019 specification-curve finding that digital-technology use explains ~0.4% of adolescent well-being variance (smaller than/comparable to wearing glasses or eating potatoes). IN_TENSION_WITH because both are empirical and the dispute is methodological and unresolved: Twenge/Haidt reply that six analytic choices shrank a real effect (especially for girls, ~r=0.15-0.20), and Orben/Przybylski rejoin that re-running with those changes leaves effects still tiny. High confidence on the tension relationship (the effect-size anchor is methodologically strong, empirical_support=moderate) while the underlying science remains genuinely contested — the edge records a real clash, not a settled verdict."
