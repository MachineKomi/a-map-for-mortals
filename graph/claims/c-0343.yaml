notes: "Singleton. Laozi (traditional attribution), Daodejing 37. Report unit (eastern). PD alternative wording held by report — Legge (1891): 'The Tao in its regular course does nothing for the sake of doing it, and so there is nothing which it does not do.' Report flags Legge's Christianising register. Pair with ch. 48 (decrease and decrease again) and ch. 2 — SPLIT: these are distinct points. Textual core of the self-cultivation-vs-spontaneity fork against Confucian xiushen/li (headline dilemma of this report). Slingerland (Trying Not to Try) named as best modern bridge on wu-wei. Quoted wording D.C. Lau (Penguin, in-copyright)."
