notes: "Singleton. Spinoza (per Nietzsche's postcard to Franz Overbeck, 30 July 1881) — Nietzsche summarises Spinoza's doctrine in five points: denies freedom of the will, teleology, the moral world order, the unegoistic, and evil. The quotation is Nietzsche's summary, not Spinoza's text. TENSION (preserve, do not resolve): 'I have a precursor' vs Nietzsche's later critique of Spinozan conatus/self-preservation (GS §349, BGE §13) — approval real but qualified. KAUFMANN COPYRIGHT FLAG: the only English wording held is Walter Kaufmann's (The Portable Nietzsche, 1954, in-copyright) — print gate blocks it; PD alternative is the German original (KSB vol. VI) or Spinoza's own doctrine (Elwes Ethics translation). No PD English wording held — do not fabricate."
