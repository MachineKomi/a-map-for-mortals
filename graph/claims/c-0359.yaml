notes: "Singleton. Motoori Norinaga, Genji monogatari Tama no Ogushi (1799). Report unit (eastern). Observational/aesthetic, not prescriptive doctrine. RECEPTION CAVEAT (report key finding 4): the canonical formulation of mono no aware is a reception fixed by Norinaga's 1799 treatise — a polemic rejecting the then-dominant Buddhist/Confucian moral readings of Genji — not a timeless doctrine; the concept existed in Heian literature but its theoretical precision is 18th-c. Bracketed '[Genji was written]' is the report's own interpolation marker, preserved as given. Cross-check anchor: SEP, Japanese Aesthetics. Marra/Harper translations are modern; report does not establish the quoted wording's edition status. DISTINCT from the Kenko impermanence-as-precious unit (u-0203/c-0360): that is an aphorism on preciousness-from-uncertainty; this is an aesthetic theory of sensitivity."
