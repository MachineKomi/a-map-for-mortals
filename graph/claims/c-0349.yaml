notes: "Singleton. Buddha (attributed; via the Dhammapada, Pali canon), v. 1 (Yamakavagga). Report unit (eastern). RE-DERIVATION: report/extract labelled claim_type prudential and polarity prescriptive; re-derived as observational/descriptive — the verse as held is a generalisation about mental causality, not advice (its prescriptive payoff comes in the verse's continuation, not quoted here). TRANSLATION CAUTION (per report): 'all' is Buddharakkhita's insertion, not in the Pali (Bhikkhu Dhammanando/K.R. Norman); Norman renders 'Mental phenomena are preceded by mind'; Thanissaro 'Phenomena are preceded by the heart.' MISATTRIBUTION WATCHLIST: do NOT over-read as idealism — 'we are what we think' is Byrom's loose paraphrase, and 'mind is everything' is a hard fake. Not held as metaphysical idealism. Buddharakkhita (BPS 1985) in-copyright; Müller SBE PD exists for the underlying text."
