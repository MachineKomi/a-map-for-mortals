notes: "Singleton. Tomaso, Johnson & Nelson 2021 (Sleep); report finding. Universal-ish: the report's most robust health finding. Large negative effect on positive mood; adaptive emotion regulation g=−0.32. DISTINCT from c-0441 (amygdala fMRI mechanism): that is the neural mechanism (one small study), this is the population mood/ regulation meta-analysis — different proposition, NOT merged. Both support 'protect your sleep'."
