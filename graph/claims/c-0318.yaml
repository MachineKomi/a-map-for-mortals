notes: "Singleton. Yasna Haptanghaiti, Yasna 35.2 (Narten 1986 rendering via Encyclopaedia Iranica). Report unit ZO-04. RE-DERIVATION: attribution_confidence 'communal' — the Yasna Haptanghaiti is an anonymous communal liturgy attributed to the tradition, not to Zarathustra personally (report dates it slightly post-Zarathustra). The humata/huxta/hvarsta formula — 'the unifying motto of living Zoroastrianism' per Boyce. NOT in Insler (the YH is outside his 1975 volume): standard authority is Narten 1986 (German); Hintze, A Zoroastrian Liturgy (2007) is the modern scholarly edition — report Lead #1 says get verbatim Y35.2 from Hintze in print. Narten/EIr rendering in copyright; PD alternative Mills, SBE 1887. Addresses the word/deed-integrity fork (report fork 7)."
