id: c-0128
canonical_claim: "How we habitually explain setbacks — as permanent/pervasive/personal (pessimistic) versus temporary/specific/external (optimistic) — predicts vulnerability to helplessness and depression, and this explanatory style can be deliberately shifted."
claim_type: empirical
polarity: prescriptive
conditionality: conditional
member_units: [u-0481]
