notes: "Singleton. Teresa of Avila, 'Nada te turbe' (poem found written in her own hand in her breviary). Report unit (womens-voices). AUTHENTICITY CAVEAT (report/Kavanaugh, ICS 1985): the wider Teresa poetry corpus has general authentication problems (lack of autographs, mixture with other Carmelites' verse); THIS poem is among the best-attested — the strongest attestation in Teresa's poetry: found in her breviary in her own hand (autograph). TRANSMISSION: direct (autograph). claim_type kept prudential (equanimity counsel) per extract; the report also reads it as metaphysical — 'solo Dios basta' grounds the counsel in a metaphysical claim; noted, not flattened. COPYRIGHT: 16th-c. Spanish text PD; Peers translation PD; Kavanaugh (ICS 1985) in-copyright. WATCHLIST: 'Christ has no body now but yours' is of DISPUTED Teresian authorship — do not attach to her without verification. Cultivates (per report): patience, equanimity; guards against anxiety, agitation. life_stages left empty per report."
