notes: "Singleton. Harris/CHT 'race to the bottom of the brain stem' (2016), coined phrase. Structural-critique pole of the attention meta-fork. Former Google design ethicist; studied under Fogg. Builds on Simon (do not attribute attention-economy to Harris). SPLIT from c-0171 (designer-user asymmetry): that is the power-asymmetry framing; this is the capture-dynamics framing. SPLIT from c-0144 (Odell attention-as-resistance): Odell frames withdrawal as agency; Harris describes capture mechanics."
