notes: "Singleton. Watts, Duncan & Quan 2018 (Psychological Science); report finding F13. CONTESTED. The attenuation (original ~0.2 SD/min → ~0.1 SD/min, cut by ~two-thirds after controls) is the claim. Contrast c-0431 (Dunedin self-control gradient, which survives sibling controls): DIFFERENT construct (delay-of-gratification at 4) and DIFFERENT finding (attenuation), NOT merged."
