id: c-0433
canonical_claim: "A large marshmallow-test replication (N≈900) found each extra minute waited at age 4 predicted only ~0.1 SD higher age-15 achievement — about half the original correlation, cut by ~two-thirds after family-background and cognitive controls."
claim_type: empirical
polarity: descriptive
conditionality: contested
member_units: [u-0170]
