id: c-0099
canonical_claim: "A 2024 quantitative test found Diamond's 'axis of orientation' hypothesis only weakly supported: ecologically similar societies share more cultural traits, but Eurasia is not significantly more ecologically homogeneous than other continents — latitude is 'not destiny.'"
claim_type: empirical
polarity: descriptive
conditionality: conditional
