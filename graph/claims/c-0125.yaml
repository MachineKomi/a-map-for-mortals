id: c-0125
canonical_claim: "People differ in decision style — maximisers search exhaustively for the best option while satisficers stop at good-enough — and maximising is associated with more regret and lower reported satisfaction, though the link is measurement-contested and culturally moderated."
claim_type: empirical
polarity: descriptive
conditionality: contested
member_units: [u-0478]
robustness_profile:
  recurrence:
    rating: low
    certainty: high
    basis: "empirical finding — recurrence not the relevant axis; see empirical_support"
  source_diversity:
    rating: moderate
    certainty: moderate
    basis: "Schwartz et al. 2002 plus Diab, Gillespie & Highhouse 2008 critique and Roets, Schwartz & Guan 2012 cross-cultural work"
  temporal_spread:
    rating: moderate
    certainty: high
    basis: "2002 origin, contested 2008 onward"
  claim_type_dim:
    rating: high
    certainty: high
    basis: "directly testable"
  empirical_support:
    rating: moderate
    certainty: moderate
    basis: "CONTESTED MEASUREMENT: original 13-item Maximization Scale has poor psychometrics; Diab et al. 2008 found with a cleaner measure maximisers are 'just as happy as satisficers' apart from more regret"
  contestation:
    rating: high
    certainty: moderate
    basis: "measurement-contested; culturally moderated (present in US/Western Europe, absent in China per Roets et al. 2012)"
  attribution_integrity:
    rating: high
    certainty: moderate
    basis: "attested by wave-3 report; Schwartz et al. 2002 (JPSP 83)"
  survives_scrutiny:
    rating: moderate
    certainty: moderate
    basis: "the regret-link survives; the unhappiness-link is measurement-dependent"
