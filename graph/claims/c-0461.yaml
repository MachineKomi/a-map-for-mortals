notes: "Singleton. Atul Gawande, Being Mortal: Medicine and What Matters in the End (Metropolitan Books 2014); report (wave-2 childhood-old-age). Report label verified. IN COPYRIGHT (Metropolitan 2014) — quote briefly. Report claim_type label was compound 'normative (prudential) + empirical (cites palliative-care survival study)' — re-derived to normative (a claim about what matters at the end); the empirical strand kept out of the claim: Gawande cites a finding that early-palliative-care patients 'lived 25% longer' — treat as a REPORTED study, not Gawande's own data. Report gloss: two courages — to face mortality, and to act on it; warns medicalised fighting can inflict 'barbaric' suffering. DISTINCT from Byock (c-0459) and Ware (c-0460): this is the authorship/integrity claim, NOT merged."
