notes: "Hadith reported from Anas ibn Malik (Jāmiʿ al-Tirmidhī); the doctrine of tawakkul. NORMATIVE (religious), never empirical. VARIANT: the popular English 'Trust in God, but tie your camel' reverses the hadith's clause order (tie first, then trust). Prudence pole of the courage-vs-prudence and faith-vs-effort forks. CONVERGENCE (S4 edge, not merge): near-twins with Hippocrates/'Call on God, but row away from the rocks' — graded plausibly-independent but tentative (Mediterranean contact)."
