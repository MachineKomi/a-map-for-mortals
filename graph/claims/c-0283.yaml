notes: "The proverb 'honesty is the best policy', first attested in Sandys, Europae Speculum (1599, PD). ATTESTATION CAVEAT: Sandys is the FIRST ATTESTATION, not the author-as-endorser — his 1599 sentence ('Our grosse conceipts, who think honestie the best policie') embeds it in a critical clause that disparages the merely prudential reading, hence endorsement: undercut. The proverb itself circulates communally in English. Honesty pole of the honesty-vs-tact fork (report reconciliation: whether truth's benefit outweighs relational harm). Cross-cultural weighting: the tact counter-pole is proverbially weak in English but strong in East Asian traditions."
