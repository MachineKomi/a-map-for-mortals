notes: "The Ubuntu maxim (Nguni: umuntu ngumuntu ngabantu), communal proverb of the Nguni (Zulu/Xhosa) peoples. Claim_type normative, NEVER empirical per the report. Anchors the individual-vs-community fork; convergence candidate (S4 edge only, not merge) with Golden Rule/one-body traditions. Conditionality contested: Mboti's 'purposely fuzzy' charge (2015) and Matolino & Kwindingwi 'The end of ubuntu' (SAJP 2013) dispute the normative content; Metz's relational formalisation defended in SAJP 2014. Cognates across Bantu languages (Shona, Sotho, Venda, Tsonga)."
