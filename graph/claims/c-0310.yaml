notes: "MERGE (FLAGGED per the report's cross-report overlap note). u-0099 (wave-1, Near-Eastern report HW-13) and u-0302 (wave-2, Persian report) carry the SAME Saadi maxim — Gulistan ch.1 story 10 'Bani Adam' — in different English renderings. Both units' notes flag 'FLAG FOR MERGE: overlaps the wave-1 Near-Eastern report'. The two are genuinely the same proposition (one-body / human sympathy), so merged here; the cardinal rule is satisfied (identical proposition, same author, same work, same passage). u-0099 credits Rehatsek 1888 (PD); u-0302's translator is unresolved (Gate C rerun cleared a wrong 'Dick Davis' credit; copyright_flag kept in-copyright conservatively). TEXT-CRITICAL FORK: banl adam a'za-ye yekdigar-and ('limbs of one another', in all early MSS) vs yek peykar-and ('one body'); the UN carpet's Persian uses yekdigar while the English UN plaque uses Eastwick's 1880 rendering of the later yek peykar variant — do not present either as definitively original; flag before any 'one body' framing goes to print. Report CONV-3: golden-rule / one-body cluster with Hillel (u-0083) and Mt 5:44 (u-0093), ~13 centuries and little direct contact apart — CONVERGES_WITH edges, NOT further merges (the three are distinct propositions)."
