notes: "Singleton. Patanjali, Yoga Sutras 1.2 (with 1.12 on the means). Report unit (eastern). Sutra 1.2 is definitional in form; held as prudential Practice because its function is a programme for stilling mental agitation, per 1.12 (abhyasa + vairagya) — the soteriological payoff beyond tranquillity would be metaphysical and is not asserted here. No physical postures in the definition (report). In-copyright modern standard: Bryant 2009; Vivekananda translation is PD per report inventory. Quoted wording is the ancient Sanskrit sutra itself. Edge candidate (FOR MERGE with Stoic/wave-1 material): non-attachment <-> ataraxia convergence, per report Stage 3 — candidate, not conclusion (cross-tradition S4 edge, not a merge)."
