notes: "Singleton. Aristotle, Nicomachean Ethics II.6 (1106b36-1107a2) — the doctrine of the mean. DISTINCT from u-0040 (habituation), u-0041 (function argument), u-0042 (one swallow/external goods): each is a distinct Aristotelian proposition. Not a mechanical midpoint: some acts (e.g. murder) have no mean; the mean is relative to us and reason-determined. Copyright: Ross (1908) PD."
