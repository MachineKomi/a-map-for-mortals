notes: "Singleton. Zuhayr ibn Abi Sulma, Mu'allqa, gnomic (hikma) section (translator unidentified). Report unit MU-03. RE-DERIVATION DIFFERENCE: report tags polarity prescriptive, but the quoted evidence is a cautionary consequence-statement about hoarding (kept cautionary here; the generosity prescription is implicit). The muruwwa (manly virtue) ethic. Context: the ode was composed after the ~40-year War of Dhis and al-Ghabra (Banu 'Abs vs Banu Dhubyan, c. 560s-600s CE) and praises the peacemakers Harim ibn Sinan and al-Harith ibn 'Awf, who paid the blood money over three years. Translator unidentified — copyright unknown; PD locators: Jones (1782), Lyall (1930); Arberry 1957 in-copyright. Pairs with Saadi's Bani Adam (c-0310) in the self-vs-community fork — CONVERGES_WITH edge, NOT a merge."
