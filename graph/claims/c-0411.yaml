notes: "Singleton. Nietzsche, Twilight of the Idols 'Maxims and Arrows' §12. German original PD (1889). WATCHLIST: the popular English 'He who has a why to live for can bear with almost any how' is Viktor Frankl's paraphrase (Man's Search for Meaning, 1946), credited to Nietzsche — the verbatim is Nietzsche's, the popular form is Frankl's. Both Kaufmann and Ludovici omit the aphorism's second half ('Man does not strive for pleasure; only the Englishman does.'). COPYRIGHT CAVEAT (DEFERRED TO GATE F): English translator ambiguous in report (Kaufmann in-copyright vs Ludovici 1911 PD) — line-match vs Gutenberg #52263 before print; PD alternative (Ludovici) exists, never fabricate its wording. Do NOT upgrade this deferred verification."
