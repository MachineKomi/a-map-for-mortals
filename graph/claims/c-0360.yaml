notes: "Singleton. Yoshida Kenko, Tsurezuregusa (Essays in Idleness), sec. 7. Report unit (eastern). Observational-aesthetic, not doctrine: Keene notes Kenko's celebration of impermanence-as-beauty differs from both the Greek view (uncertainty as grief) and orthodox Buddhism (which rarely saw impermanence as desirable) — Kenko the aesthete, not doctrinaire (report). Quoted wording taken from the report's fuller Details rendering of Keene sec. 7 (the unit block elides the middle clause). For print, prefer re-verification against PD Sansom 1911 or licence check on Keene. Keene (Columbia UP, 1967) in-copyright; Sansom 1911 is the PD alternative per report. DISTINCT from the mono no aware unit (u-0202/c-0359): that is Norinaga's aesthetic theory of sensitivity; this is an aphorism on preciousness-from-uncertainty."
