notes: "MERGE (FLAGGED per the report's cross-report overlap note). u-0102 (wave-1, Near-Eastern report) and u-0296 (wave-2, Persian report) carry the SAME Attar proposition — the Conference of the Birds Simorgh revelation: the thirty birds (si morgh) who survive the quest find that the Simorgh they sought is themselves (the climax turns on a Persian pun). The two are genuinely the same proposition (same author, same work, same climactic scene), so merged here; the cardinal rule is satisfied. NO verbatim quotation is held in either unit — both summarise the parable's resolution; u-0102 credits Davis & Darbandi, u-0296 credits Darbandi & Davis 1984 (both in copyright); no wording held, so copyright_flag unknown. The wave-2 unit (u-0296) notes it 'Develops Attar beyond the one unit held in the Near-Eastern report' — confirming the intended cross-report consolidation. Sufi unit — Attar is not named on the Rumi/Hafiz watchlist, but the same quarantine applies: no popular renderings admitted without matching a scholarly edition."
