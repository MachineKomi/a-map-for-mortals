notes: "Singleton. Thucydides, History of the Peloponnesian War 5.103 (Melian Dialogue) (Crawley 1874, PD); report (wave-2 practical-strategic). Report label verified, BUT report flags: verify exact wording against the Crawley edition before final publication (lead G4) — wording treated as verification-pending. CHARACTER SPEECH: the Athenian envoys' warning to the Melians within a coercive ultimatum. endorsement: complicated — the warning is vindicated by the narrative (Melos relies on hope of Spartan aid and is destroyed), yet voiced by the same envoys whose expediency doctrine the arc undercuts; not straightforwardly authorial. DISTINCT from c-0474 (strong/weak justice thesis): that is the power-asymmetry realism, this is the caution against hope — NOT merged."
