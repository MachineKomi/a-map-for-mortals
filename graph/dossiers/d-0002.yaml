notes: "First EMPIRICAL dossier (round-3 P0-7). Backs the corrected page-5 assertions a-0024 (the findings) and a-0025 (the synthesis), which now carry dossier_ref: d-0002. Owed enhancement (not done, honestly): the page still draws one model's curve; a competing-model chart (drawing the ~$200k Bennedsen alternative alongside the ~$100k reading, or a comparison form) is queued so the figure shows the contest the caption describes."
