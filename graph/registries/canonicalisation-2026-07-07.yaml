# Gate A registry canonicalisation — adjudicated mapping (audit record)
# Proposed by a fresh-context subagent (computation proposes); adjudicated by the lead
# (adjudication disposes) with unit-level verification of every ambiguous string.
# Applied to traditions.yaml / domains.yaml by tools/apply_canonical_ids.py.
# canonical_id is a revisable aggregation view — raw strings are never rewritten in units,
# so any mapping here can be re-adjudicated without data loss.
adjudication:
  date: 2026-07-07
  method: >-
    Fresh-context subagent proposed 153+154 mappings with contested flags (generous by
    charter). Lead adjudicated all ~40 contested entries; five ambiguous raw strings were
    checked against their actual units before ruling (u-0053 Hesiod -> archaic-greek
    confirmed; u-0052 Sophocles-primary -> tragedy; u-0070 Spinoza -> rationalist
    confirmed; u-0195 Tirukkural -> OVERRIDE to indic/tamil, dropping the disputed Hindu
    label the raw string carries; u-0345 'English' -> OVERRIDE to
    european/english-folk-proverbial, matching its communal re-derivation). One family
    scope note amended: 'empirical' family membership records discipline of origin, NOT a
    claim-type warrant — claim types are adjudicated per unit (Byock memoir counsel stays
    prudential). Contested flags are preserved below verbatim; entries marked placeholder
    (multi-nation Indigenous strings) stay contested until per-unit splits are possible.
  care_note: >-
    indigenous/* is strictly one branch per nation/people. The two multi-nation ids
    (indigenous/aboriginal-australian for the u-0223 record-only stub; indigenous/andean)
    are registry placeholders for units that themselves refuse homogenisation — they are
    NOT pan-Indigenous merges and must split per nation if content units are ever minted
    (which for sacred/restricted material requires the community-authority process).

families:
  - {id: "greco-roman", scope: "Ancient Greek and Roman philosophy, literature, medicine, and historiography, archaic through late antiquity (incl. Neoplatonism)"}
  - {id: "egyptian", scope: "Ancient Egyptian wisdom literature (sebayt etc.)"}
  - {id: "mesopotamian", scope: "Sumerian, Akkadian, Babylonian textual traditions"}
  - {id: "jewish", scope: "Jewish tradition: Hebrew Bible, rabbinic, and later Jewish thought"}
  - {id: "christian", scope: "Christian traditions across denominations; branches for named orders/movements (jansenist, carmelite, mystic, existentialist)"}
  - {id: "islamic", scope: "Islamic religious and Sufi traditions across languages"}
  - {id: "arab", scope: "Arab traditions not framed as Islamic (currently pre-Islamic Arabian)"}
  - {id: "zoroastrian", scope: "Zoroastrian/Mazdean tradition"}
  - {id: "persian", scope: "Persian literary and adab tradition (Shahnameh, Khayyam/FitzGerald, Saadi-type material); Persian Sufi devotional material sits at islamic/sufi with language field carrying Persianness"}
  - {id: "indic", scope: "South Asian traditions other than Buddhism: Hindu, niti-shastra, statecraft, bhakti movements, Tamil corpus (indic/tamil is religiously unmarked — Tirukkural attribution disputed)"}
  - {id: "buddhist", scope: "Buddhist schools across regions (theravada, mahayana, madhyamaka, zen)"}
  - {id: "chinese", scope: "Chinese schools: Confucian, Daoist, Legalist, military strategy"}
  - {id: "japanese", scope: "Japanese cultural-literary traditions (Heian, bushido, kokugaku); Zen sits under buddhist"}
  - {id: "indigenous", scope: "Indigenous nations and peoples, strictly one branch per nation/people — never pan-Indigenous; multi-nation raw strings carry contested flags pending per-unit split"}
  - {id: "african", scope: "African peoples' traditions (one branch per people: akan, yoruba, igbo, nguni, swahili) plus academic and pan-African philosophy branches kept distinct from oral traditions"}
  - {id: "european", scope: "Post-classical European vernacular, literary, and folk traditions by nation/period (moralists, novels, drama, romanticism, folk-proverbial), incl. Russian"}
  - {id: "modern-west", scope: "Modern Western intellectual and philosophical movements from early modern rationalism onward, incl. American movements and letters"}
  - {id: "empirical", scope: "Modern findings/practice-grounded disciplines (psychology, medicine, geriatrics, palliative care). Family membership records discipline of origin, NOT a claim-type warrant — claim types are adjudicated per unit"}

