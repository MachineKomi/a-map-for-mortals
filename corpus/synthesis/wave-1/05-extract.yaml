dilemmas:
  - name: Justice vs mercy
    tension: Strict measure-for-measure justice vs mercy that suspends the ledger; corpus holds both - justice as floor, mercy as surplus.
  - name: Theodicy - prosperity of the wicked
    tension: Deferred justice / restored trust (Psalm 73, Job 38, Ludlul) vs protest with no answer (Babylonian Theodicy); NO winner - across four cultures the question outlives every answer.
  - name: Vanity vs meaning
    tension: The same observation (impermanence) yields opposite prescriptions - seize ordinary joy (Qoheleth, Siduri) vs renounce the world (a Kempis); fork preserved.
  - name: Fear vs love as motive
    tension: Fear-of-the-LORD as beginning (Proverbs) vs love as everything (Sufis, Sermon on the Mount, Augustine); developmental in some readings, but traditions genuinely weight them differently.
  - name: Law vs grace
    tension: Law/observance (Pirkei Avot, Maimonides, mitzvot) vs grace/interior transformation (a Kempis, Sermon on the Mount); signed disagreement between and within traditions.
  - name: Submission vs striving (tawakkul vs effort)
    tension: Acceptance/reliance (Qur'an 65:3, Mt 6:34, Job 1:21) vs effort (tie your camel, Avot 2:16, Maimonides); the hadith is itself the synthesis-attempt, but weighting remains contested.
convergences:
  - claim: Eat, drink, find joy in your labour as response to mortality.
    with: [Ecclesiastes 2:24 (hebrew), Gilgamesh/Siduri (mesopotamian)]
    lineage: Qoheleth shows probable Mesopotamian/Hellenistic influence; motif circulates widely in ANE wisdom - partly NOT independent. Robustness moderate, lineage-suspect.
  - claim: The righteous sufferer / theodicy protest.
    with: [Job + Psalm 73 (hebrew), Ludlul bel nemeqi + Babylonian Theodicy (mesopotamian)]
    lineage: Plausible cultural contact along the Fertile Crescent; Mesopotamian texts predate Job (Lambert, Kramer) - independence only partial (shared regional milieu). Robustness high as a recurring human question.
  - claim: Golden Rule / one-body solidarity.
    with: [Hillel (rabbinic), Sermon on the Mount (christian), Saadi Bani Adam (islamic)]
    lineage: Little direct contact between Saadi (13th-c. Persia) and Hillel (1st-c. Judea), ~13 centuries apart - among the most genuinely independent convergences in this report. Robustness high.
  - claim: Humility about one's own knowledge; wisdom found in anyone.
    with: [Ptahhotep Maxim 1 (egyptian), Proverbs 16:18 (hebrew), a Kempis I.5 (christian)]
    lineage: Shared genre (didactic instruction literature) inflates apparent convergence across ~3,500 years. Robustness moderate.
  - claim: Self-knowledge leads to knowledge of the divine.
    with: [Al-Ghazali (sufi), Augustine (christian)]
    lineage: Both draw on a shared Neoplatonic (Plotinus) lineage - cross-pollination, NOT independent convergence; evidence of shared philosophical descent, not parallel discovery.
tensions:
  - tension: Retribution theology vs denial that desert maps to outcome (intra-Hebrew, one canon).
    sides: Proverbs' confident righteous-prosper/wicked-fall vs Ecclesiastes' and Job's denial.
  - tension: Deliverance affirmed vs wound left open (intra-Mesopotamian).
    sides: Ludlul's restoration by Marduk vs the Babylonian Theodicy's unresolved protest.
  - tension: Same datum (impermanence), opposite life-prescription (cross-tradition).
    sides: Ecclesiastes/Gilgamesh "seize ordinary joy" vs a Kempis "contempt of the world".
  - tension: Motive for the wise life - fear or love.
    sides: Fear-of-the-LORD framing (Proverbs) vs love-as-everything (Sufi poets, Sermon on the Mount).
  - tension: Agency under providence; within Islam the tawakkul/asbab balance is a live, signed debate.
    sides: Strong providence / "take no thought" (Mt 6) vs "tie your camel" / "not free to desist" (Tirmidhi, Avot).
leads:
  - Prefer Lichtheim's modern rendering of Ptahhotep over the dated PD Gunn 1906 where nuance matters.
  - PD fallbacks for in-copyright editions - Whinfield 1887 (Rumi), Bell 1897 / Wilberforce-Clarke 1891 (Hafiz), Muss-Arnolt 1901 (Gilgamesh), KJV Apocrypha (Sirach), Pusey 1838 (Augustine).
  - Proverbs 22:20 "thirty sayings" rests on Erman's emendation (shilshom to sheloshim) matching Amenemope's thirty chapters - scholarly conjecture, not settled text (Whybray, Shaw dissent).
  - Siduri's carpe-diem speech is Old Babylonian only, largely absent from the Standard Babylonian recension - editorial provenance flag for any Gilgamesh unit.
  - Saadi Bani Adam has a text-critical fork (yek peykar "one body" vs yekdigar "each other"; Foroughi edition reads yekdigar).
  - '"God helps those who help themselves" is NOT biblical - Algernon Sidney 1698, popularised by Franklin 1736, sentiment from Aesop; 52% of practicing Christians believe it biblical (Barna 2017); often confused with tie-your-camel.'
  - Qur'anic coverage here is limited to tawakkul (65:3; 3:159) - broader Qur'anic doctrinal coverage needed in a later wave; Sahih International translation is in copyright.
  - Ben Sira quotes Qoheleth, giving terminus ante quem 180 BCE - useful for dating/lineage work on Ecclesiastes (Persian loanwords + Greek mindset support late date).
notes: >
  Rumi/Hafiz pseudo-quote ecosystem must be quarantined and never seeded as primary text - Barks
  produces interpretive "versions" not translations (does not read Persian), and Ladinsky's Hafiz
  quotes are outright inventions ("about 99.9% fake" - Omid Safi); verify only against Nicholson/Whinfield
  (Rumi) and Bell/Wilberforce-Clarke (Hafiz). Qur'anic doctrinal coverage is thin (two tawakkul verses only),
  and several key scholarly editions (ANET, Lambert, Nicholson, Sandars, Davis) are in copyright - the print
  gate needs the PD fallbacks listed in leads. Report preface claims ~50 units; 34 are actually delivered
  (14 HW, 7 ANE, 7 CW, 6 IS), weighted toward the most robust, well-attested passages.
