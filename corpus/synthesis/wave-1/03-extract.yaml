dilemmas:
  - name: affirmation-vs-denial
    tension: "Affirm existence including suffering (Dionysian Yes) vs seek a 'true world' devaluing this one (ascetic No)"
  - name: self-overcoming-vs-self-preservation
    tension: "Grow by overcoming yourself vs merely conserve and protect the self"
  - name: noble-vs-herd-valuation
    tension: "Values from strength and self-affirmation vs values from reactive resentment of the strong"
  - name: honesty-vs-illusion
    tension: "Pursue truth even when it wounds vs prefer consoling fictions"
  - name: solitude-vs-herd
    tension: "Bear the loneliness of becoming who you are vs seek the warmth of conformity"
  - name: amor-fati-vs-revolt
    tension: "Love what is necessary vs wage war on the ugly and unchosen"
convergences:
  # report caveat: convergence = robustness, NOT truth — encode as corroboration, never proof
  - claim: "Becoming over being; strife/conflict as generative"
    with: [Heraclitus, Nietzsche]
  - claim: "Denial of teleology, free will, and a moral world-order; naturalized ethics"
    with: [Spinoza, Nietzsche]
  - claim: "Undeceived psychology of motives; honesty experienced as joy"
    with: [Montaigne, French moralists, Nietzsche]
  - claim: "Realism, anti-Platonism, courage before reality"
    with: [Thucydides, Nietzsche]
  - claim: "Shared psychological depth (tension within convergence over Christianity and pity)"
    with: [Dostoevsky, Nietzsche]
  - claim: "Amor fati echoes Stoic acceptance (partial; via Stoic inheritance from Heraclitus)"
    with: [Stoics, Heraclitus, Nietzsche]
tensions:
  - tension: "Self-preservation vs self-overcoming"
    sides: "Spinoza's conatus vs Nietzsche's self-overcoming/expansion"
  - tension: "Spinoza as precursor and target — do not resolve"
    sides: "'I have a precursor' (postcard to Overbeck, 1881) vs later conatus critique (GS §349, BGE §13)"
  - tension: "Shared psychological depth, opposite conclusions"
    sides: "Dostoevsky's Christianity and pity vs Nietzsche's repudiation of both"
  - tension: "Acceptance of fate, divergent temper"
    sides: "Stoic apatheia and 'living according to nature' vs Nietzsche's rejection of both (BGE §9)"
  - tension: "Schopenhauer admired and repudiated — keep both live"
    sides: "Honest solitary exemplar (approved) vs 'nihilistic devaluation of life' (rejected)"
  - tension: "Socrates admired and opposed — retain only as fork, not wisdom source"
    sides: "Residual intellectual courage/agon vs the 'absurdly rational' turn blamed for Greek decadence"
