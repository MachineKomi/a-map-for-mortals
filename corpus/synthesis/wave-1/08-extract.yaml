dilemmas:
  - name: connection-causality
    tension: Are relationship-mortality links causal, or confounded by baseline health and SES? No RCT can settle it.
  - name: money-thresholds
    tension: How much money matters, for whom, and where returns flatten ($100k? $200k?) is unsettled; Easterlin's relative-vs-absolute paradox stands.
  - name: ppi-efficacy
    tension: Do positive-psychology and gratitude interventions beat active controls or placebo at all?
  - name: ptg-reality
    tension: Is post-traumatic growth real change, or retrospective cognitive bias and coping?
  - name: u-curve-status
    tension: Is the midlife U-curve real, an artifact of controls, or disappearing as youth well-being declines?
  - name: weird-generalisability
    tension: Do money, gratitude, purpose, and ageing effects generalise beyond WEIRD samples?
  - name: marriage-adaptation
    tension: Does marriage durably raise happiness, or do people adapt back to baseline within ~2 years?
convergences: []
tensions:
  - tension: Does national happiness rise with long-run GDP growth?
    sides: Easterlin (relative income; no long-run rise) vs Stevenson & Wolfers (log-linear rise, no satiation).
  - tension: Does experienced well-being plateau with income?
    sides: Kahneman & Deaton ($75k plateau) vs Killingsworth (no plateau); KKM 2023 reconciliation itself challenged by Rohrer & Wenz 2024.
  - tension: Is the midlife well-being U-curve real?
    sides: Blanchflower (U-shapes in 618 studies) vs Galambos/Bartram (artifact of controls, not robust or universal).
  - tension: How large is exercise's antidepressant effect?
    sides: Umbrella reviews (moderate, comparable to therapy) vs low-risk-of-bias RCTs (substantially smaller or non-significant).
  - tension: Does childhood delay of gratification predict adult success?
    sides: Dunedin self-control gradient (yes, robustly) vs Watts 2018/Sperber 2024 (mostly background/SES; possibly null); defenders cite censoring bias.
  - tension: Is reported post-traumatic growth genuine?
    sides: Retrospective PTGI reports of growth vs prospective measures showing perceived growth tracks increased, not decreased, distress.
  - tension: Are happiness and meaning genuinely distinct?
    sides: Distinct correlates (Baumeister 2013) vs roughly half-shared variance (r~0.53, UK Biobank estimate).
leads:
  - A large quasi-experimental or instrumental-variable study showing relationship-mortality links mostly confounded would downgrade the Tier-1 "prioritise connection" recommendation.
  - If new low-risk-of-bias RCTs converge near null, downgrade exercise-for-mood to a "general health" rationale only.
  - Settle where income returns flatten - ~$100k for the unhappy minority vs ~$200k overall (Rohrer & Wenz 2024; arXiv reanalysis).
  - Direct replication of Lally et al. 2010's exact habit-formation procedure is still outstanding; meta-analysis corroborates the medians only conceptually.
  - Preregistered active-control trials are needed to establish whether gratitude/PPI interventions have any clinical usefulness vs placebo.
  - Youth well-being decline and its proposed cause (smartphones/social media) rest partly on working papers; watch for peer-reviewed confirmation.
  - Resolve Sperber et al. 2024's null (delay of gratification not predicting adult functioning) against the censoring-bias defence.
notes: >-
  Failed-replication quarantine: ego depletion (failed 23-lab preregistered replication, grade-E),
  positivity ratio (mathematically debunked, partially retracted, grade-E), prosocial spending
  (registered replication failed on broad measures, grade-E/D), marshmallow test (~two-thirds
  attenuation under controls), PPI effects inflated (shrink to r~0.10), gratitude control-dependent.
  Evidence base is heavily WEIRD and self-report dominated; effects recurrently shrink under
  preregistration, larger samples, active controls, and SES adjustment.
