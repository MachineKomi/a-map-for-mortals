dilemmas:
  - name: Virtue vs pleasure as THE good
    tension: Virtue as sufficient/core good (Stoics, Aristotle) vs pleasure/ataraxia as the end (Epicureans, Cyrenaics)
  - name: Extirpation vs management of the passions
    tension: Stoic apatheia (eliminate passions via judgment) vs Aristotelian moderation / Epicurean minimisation
  - name: Fate vs agency
    tension: Stoic determinism-with-assent vs Epicurean swerve vs tragic fate (character chooses within constraint)
  - name: Civic engagement vs withdrawal
    tension: Stoic/Ciceronian civic duty vs Epicurean "live unnoticed" and Cynic rejection of convention
  - name: Endurance vs avoidance of suffering
    tension: Stoic meeting hardship head-on vs Epicurean arranging life to minimise pain
  - name: Examined life, reason, and the mean vs their limits
    tension: Examination/reason/mean (Socrates, Plato, Aristotle, Horace) vs limits of reason and deliberate extremes (tragedians, Cynics)
convergences:
  - claim: Act on what is yours, release the rest (dichotomy of control)
    with: [Epictetus, Serenity Prayer, Bhagavad Gita karma yoga]
  - claim: Count no man happy until dead — conditional, fragile eudaimonia
    with: [Solon, Sophocles, cross-cultural fragility-of-fortune motif]
  - claim: Memento mori / death-acceptance, despite divergent metaphysics (atomist vs providential)
    with: [Epicurus, Lucretius, Seneca, Marcus Aurelius, Cicero via Plato]
  - claim: The golden mean / moderation
    with: [Aristotle, Horace, Hesiod, moderation doctrines elsewhere]
  - claim: Tranquility arrives as a by-product, not a direct target
    with: [Pyrrhonist ataraxia, Epicurean ataraxia]
  - claim: Happiness should not be hostage to externals (self-sufficiency)
    with: [Cynic autarkeia, Stoic indifference, Epicurean "good is easy to get"]
tensions:
  - tension: Stoic determinism vs moral responsibility
    sides: All is fated/providential vs assent is "up to us"; Chrysippus' cylinder analogy contested
  - tension: Is eudaimonia fortune-proof?
    sides: Aristotle (external goods needed, NE I.8-10) vs Stoic orthodoxy (virtue alone suffices)
  - tension: Seneca's wealth vs Stoic indifference to riches
    sides: Suillius' 300m-sesterces charge (Tacitus, Annals XIII.42-43) vs Seneca's De Vita Beata defence
  - tension: Epicurean withdrawal vs civic duty
    sides: Epicurean "live unnoticed" (lathe biosas) vs Stoic/Ciceronian vita activa
  - tension: Epicurean swerve vs Epicurean physical determinism
    sides: Clinamen breaks the determinism the physics implies; criticised as ad hoc since antiquity
  - tension: Skeptic epoche vs the need to act
    sides: Suspending all judgment vs living requires action; Sextus' "follow appearances and custom" contested
leads:
  - Confirm Stobaeus locus for Democritus DK 68 B191 (currently sourced secondhand)
  - Confirm exact Latin of Cicero, Tusculan Disputations I.30.74 (currently sourced secondhand)
  - Confirm Sophocles Oedipus Rex closing-line numbers ~1528-1530 (currently sourced secondhand)
