  - Build a dedicated misattribution node type; ingest the hard fakes only as cautionary exhibits, each linked to the genuine passage it distorts
  - Re-verify "verified" units against critical editions (e.g. Oxford Classical Texts); downgrade to probable on failure
  - Test convergence candidates cross-tradition (Serenity Prayer, Gita, moderation doctrines elsewhere)
  - Test whether Stoic "indifference" coherently permits possessing wealth without attachment (Seneca case)
notes: >-
  Greek/Latin originals PD; the copyright risk is translations — use the named PD translators
  (Jowett, Long, Carter, Ross, Hicks, Gummere, Evelyn-White, Conington, Ramsay etc.); famous punchy
  wordings are often in-copyright renderings (e.g. Staniforth's "Waste no more time..."). A 13-item
  misattribution watchlist was checked: hard fakes (two "Marcus Aurelius" quotes, "luck is preparation
  meets opportunity" Seneca, two "Aristotle" lines, Durant's "we are what we repeatedly do", Maclaren's
  "be kind...") must be quarantined, never ingested as wisdom units. All Socrates units are
  Socrates-via-Plato (Socratic problem); probable-confidence units (Democritus B191, tetrapharmakos,
  Diogenes anecdote, clinamen, Cicero/Phaedo, "count no man happy") are transmitted via
  doxography/anecdote/compression and need visible flags — good as contested forks, not authoritative maxims.
