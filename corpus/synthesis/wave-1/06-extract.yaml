  - claim: "Happiness comes from within (what one is), not possessions."
    with: [schopenhauer, stoic, epicurean, buddhist-non-attachment, emerson-thoreau]
  - claim: "Outward-directed interest cures self-absorption."
    with: [russell, confucian-relational-ethics, smith-sympathy]
  - claim: "Optimal middle distance in relationships."
    with: [schopenhauer-porcupines, confucian-li, aristotle-friendship]
  - claim: "Reason should govern passion — contradicted by Hume/Vauvenargues and Daoist wu wei."
    with: [spinoza, kant, stoic-hegemonikon, plato-charioteer]
tensions:
  - tension: "Reason vs. passion primacy — a real, unresolved fork about the springs of action."
    sides: "Kant/Spinoza/Stoics (reason governs) vs. Hume/Vauvenargues (passion primary)."
  - tension: "Is self-interest the truth of virtue? Note claim-type slippage: observational vs. normative."
    sides: "La Rochefoucauld (Hobbesian-leaning) vs. Smith / Mencius (moral sprouts) / Kant."
  - tension: "Does society corrupt or constitute the self?"
    sides: "Rousseau/Thoreau/Schopenhauer (corrupts) vs. Aristotle/Confucius/Smith (constitutes)."
  - tension: "Pessimism vs. affirmation about existence itself."
    sides: "Schopenhauer (existence as suffering) vs. Spinoza/Emerson (affirmation)."
  - tension: "Determinism vs. radical freedom."
    sides: "Spinoza (freedom = understanding necessity) vs. Sartre (condemned to be free)."
leads:
  # Nietzsche deconfliction (overlap with sibling Nietzsche report — MERGE downstream, do not duplicate)
  - "Montaigne: keep this report's units primary; MERGE Nietzsche's reception (honesty/cheerfulness) as a reception node/edge."
  - "La Rochefoucauld: MERGE Nietzsche's 'psychologists of suspicion' genealogy-of-morals reading as a related edge."
  - "Pascal: MERGE 'Nietzsche on Pascal' (most instructive Christian 'victim') as a reception edge."
  - "Spinoza: MERGE Nietzsche's 1881 'I have a precursor!' postcard as a reception edge."
  - "Emerson: MERGE Nietzsche's heavily annotated Emerson as a reception edge."
  - "Schopenhauer: let the Nietzsche report carry 'Schopenhauer as educator'; MERGE formative debt and later break."
  # Misattribution watchlist (route each to a misattribution edge)
  - "Voltaire 'defend to the death your right to say it' — actually Evelyn Beatrice Hall (1906) paraphrase; Hall disowned attribution (1939 letter)."
  - "Voltaire 'What a fuss about an omelette!' is Hall's reportage, not a sourced verbatim Voltaire text — do not promote."
  - "'Go confidently in the direction of your dreams' — imperative-mood paraphrase of Walden 'Conclusion', not verbatim Thoreau."
  - "Pseudo-Montaigne 'terrible misfortunes... most never happened' — apocryphal; authentic source Seneca, Moral Epistles 13.4."
  - "Thoreau 'not enough to be busy; so are the ants' — paraphrase of letter to H.G.O. Blake, 16 Nov 1857."
  - "'In wildness is the preservation of the world' genuine (Thoreau, 'Walking') but commonly garbled to 'salvation'/'wilderness'."
  - "Emerson 'Consistency is the hobgoblin of little minds' — truncation drops 'A foolish', inverting the meaning."
  - "Kierkegaard 'understood backwards' aphorism is a condensed paraphrase of Journalen JJ:167; 'life is not a problem to be solved' does not appear in his writings."
  - "La Bruyère 'life is a tragedy for those who feel' — dubious; very close to Horace Walpole, letter 31 Dec 1769."
  - "Thoreau 'quiet desperation' is GENUINE (Walden, 'Economy') — frequently doubted but verified."
  # Pipeline leads
  - "Pascal: store all three numbering keys (Lafuma/Sellier/Brunschvicg) as separate graph properties; Sellier is current scholarly standard."
  - "Hume 1739 original has single comma ('ought only to be the slave'); two-comma version is modernized punctuation."
  - "Schopenhauer porcupine wording is Saunders's 'Studies in Pessimism' anthology — do not pair Saunders text with 'Parerga §396' citation unqualified."
  - "Upgrade trigger: probable units (Chamfort 'crapaud', Joubert 'kind words', Weil 'attention') promote to verified only after page-level primary citation."
  - "French maxim numbering is edition-dependent (Vauvenargues, Chamfort, Joubert); re-check against any alternate edition before display."
  - "Cross-tradition convergences (Stoic/Epicurean/Buddhist/Daoist/Confucian) are candidate edges for downstream merging with sibling reports; robustness, not truth."
