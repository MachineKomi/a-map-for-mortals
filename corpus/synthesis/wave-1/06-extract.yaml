dilemmas:
  - name: Reason vs. Passion
    tension: "Which faculty sets our ends — passion/feeling (Hume, Vauvenargues, Pascal) or reason (Spinoza, Kant); Smith complicates via the spectator."
  - name: Self-interest vs. Benevolence
    tension: "Self-interest explains apparent virtue (La Rochefoucauld, Bacon) vs. genuine other-regard (Smith, Mill, Kant); note La Rochefoucauld's claim is descriptive, not normative."
  - name: Authenticity vs. Social Convention
    tension: "Be oneself against society (Emerson, Thoreau, Schopenhauer, Sartre) vs. society educates conscience (Smith, La Bruyère); inner judge trained by strangers or by solitude."
  - name: Pessimism vs. Affirmation
    tension: "Existence as pain and boredom (Schopenhauer, Chamfort) vs. life-affirmation (Spinoza, Emerson, Camus, Russell); affirmation is a stance, not factual optimism."
  - name: Duty vs. Happiness
    tension: "Duty even against inclination (Kant) vs. happiness as criterion (Mill, Russell); Spinoza dissolves it (blessedness = virtue itself); Mill's higher pleasures blur the divide."
  - name: Freedom vs. Determinism
    tension: "Freedom as understood necessity (Spinoza, Hume) vs. radical freedom (Sartre, Kant); partly terminological — both sides redefine 'freedom'."
  - name: Solitude vs. Society
    tension: "Default weighting of withdrawal (Montaigne, Thoreau, Schopenhauer, Pascal) vs. sociality (Smith, Aristotle); porcupine parable models the optimal middle distance."
convergences:
  - claim: "Imagined suffering exceeds real suffering (pseudo-Montaigne; authentic source Seneca)."
