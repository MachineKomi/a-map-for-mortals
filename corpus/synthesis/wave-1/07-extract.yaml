dilemmas:
  - name: passion-vs-duty
    tension: Repression deadens; unchecked passion destroys (Anna Karenina, Austen's heroines, Tennyson).
  - name: revenge-vs-forgiveness
    tension: Vengeance perpetuates harm; forgiveness can look like injustice (Oresteia, Zosima, Valjean/Javert).
  - name: ambition-vs-love
    tension: Ambition can hollow the soul; renouncing it can waste a full nature (Macbeth, Faust, Dorothea).
  - name: self-deception-vs-truth
    tension: Truth devastates; comforting lies corrode the self (Oedipus, Grand Inquisitor, Emma, Elizabeth).
  - name: freedom-vs-fate
    tension: Fatalism breeds passivity; the illusion of total control invites hubris (ripeness is all, Oedipus, Bacchae).
  - name: pride-vs-humility
    tension: Pride blinds; excessive self-abnegation can squander gifts (Oedipus, Pentheus, Pride and Prejudice, Dorothea).
convergences:
  - claim: Accept what is not in our control (ripeness is all, count no man happy, pathei mathos) - tragedies bleaker than Stoic consolation, partial only.
    with: [Stoicism]
  - claim: Universal responsibility and non-judgment (guilty for all, active love) - framed as faith answering atheism, not neutral ethics.
    with: [Christian agape, Buddhist compassion/interdependence]
  - claim: The moral weight of ordinary fidelity (unhistoric acts).
    with: [ethics of small duties, care ethics, Confucian everyday virtue]
  - claim: Restless becoming and self-overcoming (Faust's wager, Whitman's multitudes) - do not collapse the two.
    with: [Nietzschean striving, eternal recurrence]
  - claim: Intellectual humility - cleverness is not wisdom.
    with: [Socratic "I know that I know nothing"]
  - claim: Rules underdetermine action; judgment fills the gap (contradicting proverb pairs).
    with: [Aristotelian phronesis]
tensions:
  - tension: Does suffering actually produce wisdom (pathei mathos)?
    sides: The chorus's law of Zeus vs the Oresteia's continuing vengeance cycle, where suffering teaches nothing.
  - tension: Zosima's universal guilt vs Ivan's rebellion.
    sides: Faith-grounded shared responsibility vs the unanswerable suffering of children; Smerdyakov twists "all guilty" into evasion.
  - tension: Is "loved and lost" better?
    sides: Tennyson's grief-tested affirmation vs the counter-proverb "what you never had, you never miss" - preserve the dissent.
  - tension: Is "beauty is truth" Keats's creed or the urn's limited consolation?
    sides: Keats's letters lean endorsement vs the dramatic frame (quotation marks, urn as speaker); 1820 printings differ.
  - tension: Is Eliot's finale consolation or protest?
    sides: The real diffusive good of hidden lives vs quiet protest at a society that wasted Dorothea's full nature.
  - tension: Does the happy-families maxim hold?
    sides: The narrator's aphorism vs the novel itself, which contains no ideally happy family and partly subverts it.
