    author: William Wordsworth
    tradition: English Romanticism
    stages: [child, adult, elder]
    domains: [meaning, family, wonder]
    conf: verified
    notes: >-
      Line is "father OF the Man", not "to" (Hopkins's parody uses "to" — do not conflate).
