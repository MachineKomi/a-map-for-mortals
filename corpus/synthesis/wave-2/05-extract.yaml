  - rid: youth.kipling.if
    claim: Maturity is composure treating triumph and disaster as equal impostors.
    type: Virtue
    claim_type: normative (prudential)
    author: Rudyard Kipling
    tradition: English / Victorian Stoicism
    stages: [youth, young-adult]
    domains: [character, work, resilience]
    conf: verified
