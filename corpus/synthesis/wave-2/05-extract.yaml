  - rid: elder.cicero.four-charges
    claim: Old age faces four charges — lost affairs, weakness, lost pleasure, nearing death.
    type: Dilemma
    claim_type: prudential / normative
    author: Cicero (voiced by Cato the Elder)
    tradition: Roman philosophy
    stages: [elder]
    domains: [aging, work, health, mortality]
    conf: verified
    notes: >-
      De Senectute §15, verified to section number in PD Peabody 1884. Cato is a mouthpiece;
      Cicero's endorsement is strong but literary. Each charge is rebutted — arguments, not findings.
  - rid: elder.cicero.character-not-age
    claim: Miseries blamed on old age are really faults of character.
    type: Insight
    claim_type: prudential
    author: Cicero (voiced by Cato the Elder)
    tradition: Roman philosophy
    stages: [midlife, elder]
    domains: [aging, character]
    conf: verified
    notes: >-
      §7, repeated §65 — the CONDITIONALITY key of the whole work: old age is good only for
      those with the means within themselves. A tendency, not a destiny.
  - rid: elder.cicero.wisdom-not-strength
    claim: Elders remain useful; great things are done by counsel, not strength.
    type: Virtue
    claim_type: prudential
    author: Cicero (voiced by Cato the Elder)
    tradition: Roman philosophy
    stages: [elder]
    domains: [work, usefulness, authority]
    conf: verified
  - rid: elder.cicero.actor-stage
    claim: A wise life, like a good performance, need not run to the last line.
    type: Practice
    claim_type: prudential / metaphysical (on death)
    author: Cicero (voiced by Cato the Elder)
    tradition: Roman philosophy
    stages: [elder]
    domains: [mortality, meaning]
    conf: verified
    notes: De Senectute §70; cf. §64 "broken down in the last act" — distinct image, same theme.
  - rid: elder.cicero.young-hope-old-attain
    claim: Age has already attained what youth merely hopes for.
    type: Insight
