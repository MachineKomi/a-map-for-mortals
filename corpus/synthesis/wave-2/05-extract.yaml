    claim: Spiritual entry requires recovering a childlike trust.
    type: Insight
    claim_type: normative / metaphysical
    author: Jesus (Matthew 18:3, KJV)
    tradition: Christian scripture
    stages: [child, adult]
    domains: [faith, humility]
    conf: verified
