units:
  - rid: blessing.priestly.num6
    claim: A community speaks protection, grace, and peace over its children.
    type: Practice
    claim_type: normative / metaphysical
    author: Priestly tradition (Numbers 6:24-26)
    tradition: Hebrew / Jewish (adopted in Christian liturgy)
    stages: [child]
    domains: [family, faith, belonging]
    conf: verified
    notes: >-
      Oldest surviving Hebrew Bible text (Ketef Hinnom silver scrolls, c. 600 BCE).
      Read-aloud register; report proposes it as an ideal opening page.
  - rid: fable.aesop.moral-flag
    claim: A fable's story endures; its stated moral is often later editorial addition.
    type: Danger
    claim_type: observational
    author: Perry Index scholarship (Ben E. Perry, Aesopica 1952)
    tradition: Greek fable / classical philology
    stages: [child, youth]
    domains: [education, moral-imagination]
    conf: verified
    notes: >-
      Per-fable rule — tag STORY and MORAL with separate attribution confidence.
      L'Estrange (1692) appended morals the Greek lacked; the "grasshopper" is a cicada in the Greek.
  - rid: child.teacher.wordsworth
