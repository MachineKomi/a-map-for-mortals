report: 06-persian
extracted: 2026-07-07
units:
  - rid: ZO-01
    claim: Each person must personally choose between truth and the lie; none chooses for you.
    type: Dilemma
    claim_type: normative
    author: Zarathustra
    tradition: zoroastrian
    stages: [youth, young-adult, adult]
    domains: [ethics, spirituality, decision-making]
    conf: verified
  - rid: ZO-02
    claim: Two opposed primal spirits, good and bad, express in thought, word, and deed.
    type: Insight
    claim_type: metaphysical
    author: Zarathustra
    tradition: zoroastrian
    stages: [adult, midlife]
    domains: [ethics, spirituality, cosmology]
    conf: verified
    note: Most contested Gathic stanza; modern scholarship reads the dualism as ethical/psychological, not ontological.
  - rid: ZO-03
    claim: The lie leads to worst existence, truth to best; choices carry long consequences.
    type: Consequence
    claim_type: normative
    author: Zarathustra
    tradition: zoroastrian
    stages: [adult, elder]
    domains: [ethics, spirituality]
    conf: verified
  - rid: ZO-04
    claim: The ethical life is the alignment of good thought, good word, and good deed.
    type: Virtue
    claim_type: normative
    author: Yasna Haptanghaiti (anonymous, post-Zarathustra)
    tradition: zoroastrian
    stages: [child, youth, young-adult, adult, midlife, elder]
    domains: [ethics, work, community, speech]
    conf: verified
    note: Rendering after Narten 1986 via Encyclopaedia Iranica; get verbatim Y35.2 from Hintze 2007 print.
  - rid: ZO-05
    claim: "The divine is apprehended through mind: father of Good Thinking, creator of Truth."
    type: Insight
    claim_type: metaphysical
    author: Zarathustra
    tradition: zoroastrian
    stages: [adult, midlife, elder]
    domains: [spirituality, cosmology]
    conf: probable
    note: Only fragmentary Insler wording verified online; use fuller text only after checking the physical 1975 volume.
  - rid: KH-01
    claim: Simple present pleasures — bread, wine, verse, companionship — can outweigh imagined paradise.
    type: Practice
    claim_type: prudential
    author: Edward FitzGerald (crafter; after the Khayyam tradition)
    tradition: persian-poetry
    stages: [youth, young-adult, adult]
    domains: [happiness, love, contentment]
    conf: dubious
    note: FitzGerald fused Ouseley MS quatrains 149 and 155; 1st- and 5th-edition wordings differ materially — always cite the edition.
  - rid: KH-02
    claim: The past is irreversible; no piety, wit, or tears can undo what is done.
    type: Insight
    claim_type: observational
    author: Edward FitzGerald (crafter; after the Khayyam tradition)
    tradition: persian-poetry
    stages: [adult, midlife, elder]
    domains: [time, regret, acceptance]
    conf: dubious
    note: Wording and image are FitzGerald's crafting; sentiment broadly Khayyamic.
  - rid: KH-03
    claim: Humans may be helpless pieces moved by an inscrutable player — a strong determinist reading.
    type: Danger
    claim_type: metaphysical
    author: Edward FitzGerald (crafter; after the Khayyam tradition)
    tradition: persian-poetry
    stages: [adult, midlife]
    domains: [fate, agency, meaning]
    conf: dubious
    note: A poetic voice, not a settled philosophy; directly opposes Zoroastrian free will (ZO-01) — a real fork within the Persian corpus.
  - rid: KH-04
    claim: Because tomorrow is uncertain and yesterday gone, act and drink in the present.
    type: Practice
    claim_type: prudential
    author: Edward FitzGerald (crafter; after the Khayyam tradition)
    tradition: persian-poetry
    stages: [youth, young-adult, adult]
    domains: [time, happiness]
    conf: dubious
    note: FitzGerald sharpened the hedonism and suppressed the Sufi reading — flag the Victorian filter on any carpe-diem convergence.
  - rid: KH-05
    claim: The Khayyam corpus is skeptical about dogma and knowledge's limits, not simply hedonistic.
    type: Insight
    claim_type: prudential
    author: Khayyam tradition (pseudepigraphic; literal tr. Avery & Heath-Stubbs 1979)
    tradition: persian-poetry
    stages: [adult, midlife, elder]
    domains: [mortality, knowledge, pleasure]
    conf: probable
    note: Most quatrains pseudepigraphic — "Khayyam" a frame-author for later skeptical poets; oldest source (Bodleian Ouseley 140, 1460 CE) postdates him by 312 years.
  - rid: FE-01
    claim: The world is impermanent and capricious; wisdom is to look past surfaces to underlying truth.
    type: Insight
    claim_type: prudential
    author: Ferdowsi
    tradition: persian-poetry
    stages: [adult, midlife, elder]
    domains: [meaning, wisdom, adversity]
    conf: probable
    note: Davis 2006 rendering unverified-to-page; confirm exact wording against print before quoting.
  - rid: FE-02
    claim: Even the mightiest hero cannot escape fate; the turning heavens override human strength.
    type: Consequence
    claim_type: observational
    author: Ferdowsi
    tradition: persian-poetry
    stages: [adult, midlife]
    domains: [fate, family, war, tragedy]
    conf: communal
    note: PARAPHRASE-PENDING — narrative episode (Rostam and Sohrab), not a maxim; do not present as quotation until verified against Davis 2006.
  - rid: FE-03
    claim: The smallest life is precious; do no needless harm — the foundation of just rule.
    type: Virtue
    claim_type: normative
    author: Ferdowsi
    tradition: persian-poetry
    stages: [young-adult, adult, midlife, elder]
    domains: [justice, compassion, governance]
    conf: probable
    note: English translator of the "Miyāzār muri" couplet unidentified — verify before quoting.
  - rid: FE-04
    claim: A poet's words secure a kind of immortality; language outlasts empire.
    type: Insight
    claim_type: observational
    author: Ferdowsi
    tradition: persian-poetry
    stages: [midlife, elder]
    domains: [legacy, work, mortality]
    conf: probable
    note: PARAPHRASE-PENDING — Davis 2006 wording unverified-to-page; verify before publishing as verbatim.
  - rid: NI-01
    claim: Speech is the first manifestation of existence and the ground of moral guidance.
    type: Insight
    claim_type: metaphysical
    author: Nizami Ganjavi
    tradition: persian-poetry
    stages: [young-adult, adult]
    domains: [language, wisdom, art]
    conf: probable
    note: English wording cited in scholarship; confirm translator/edition.
  - rid: NI-02
    claim: Unchecked, all-consuming passion can destroy the self (the Majnun archetype).
    type: Danger
    claim_type: observational
    author: Nizami Ganjavi
    tradition: persian-poetry
    stages: [youth, young-adult]
    domains: [love, obsession, self]
    conf: communal
    note: PARAPHRASE-PENDING — narrative, not a quote; Nizami's Sufi layer also reads the frenzy as divine intoxication, so preserve both readings.
  - rid: AT-01
    claim: The divine sought outside proves to be the seekers' own collective self.
    type: Insight
    claim_type: metaphysical
    author: Attar
    tradition: persian-poetry
    stages: [adult, midlife, elder]
    domains: [spirituality, self-knowledge, meaning]
    conf: communal
    note: PARAPHRASE-PENDING — plot climax (si morgh pun), not a verbatim line; verify against Darbandi & Davis or Wolpé.
  - rid: AT-02
    claim: The path to wisdom requires abandoning inherited dogma and worldly knowledge.
    type: Practice
    claim_type: prudential
    author: Attar
    tradition: persian-poetry
    stages: [young-adult, adult]
    domains: [spirituality, learning, growth]
    conf: communal
    note: PARAPHRASE-PENDING — summary of the seven-valleys scheme; verify verbatim before quoting.
  - rid: MU-01
