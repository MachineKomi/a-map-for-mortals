dilemmas:
  - name: Truth vs the Lie (asha vs druj)
    tension: Personal, repeatable choice with cosmic stakes (ZO-01–04); resonates with the project's "truth above all" but is normative/metaphysical, not empirical
  - name: Fate vs Will
    tension: Zoroastrian free choice rejecting predestination (ZO-01) vs Ferdowsi's tragic fatalism (FE-02), FitzGerald-Khayyam determinism (KH-03), Zuhayr's inescapable death (MU-02) — a genuine cross-text fork, not consensus
  - name: Carpe diem vs Piety
    tension: Present pleasure (KH-01, KH-04) vs deferred religious reward; converges with Horace/Ecclesiastes/Siduri through a Victorian filter
  - name: External vs Internal quest
    tension: The sought divine turns out to be the seeker's own self (AT-01)
  - name: Passion vs Prudence
    tension: Majnun's all-consuming love as both self-destruction and mystical ideal (NI-02)
  - name: Self vs Community
    tension: Saadi's Bani Adam (SA-01) and Zuhayr's generosity ethic (MU-03) — solidarity as constitutive of being human
  - name: Word/deed integrity
    tension: Zoroastrian humata/hukhta/hvarshta — alignment of thought, speech, and action (ZO-04)
  - name: Legacy vs Present-moment
    tension: Ferdowsi's poetic immortality (FE-04) vs Khayyam's "today is all we have" (KH-04) as rival responses to mortality
convergences:
  - claim: Truth-above-all — Zoroastrian asha and Ferdowsi's sacredness of truth vs the project's founding rule
    with: [Zoroastrian asha (ZO-01–04), Ferdowsi, project founding principle]
    note: FLAGGED CANDIDATE, NOT FORCED — the Gathic claim is normative/metaphysical, never empirical; asha translation ("truth" vs "righteousness/cosmic order") is itself unsettled
  - claim: Uncertainty of tomorrow / live now
    with: [Zuhayr (MU-01), FitzGerald-Khayyam (KH-04), Horace/Ecclesiastes/Siduri existing cluster]
    note: Three-plus independent traditions; annotate the Victorian filter on the Khayyam limb
  - claim: Know the limits of knowledge
    with: [Khayyam skepticism (KH-05), Attar's abandon-dogma valleys (AT-02), Socratic ignorance]
  - claim: Shared humanity / empathy
    with: [Saadi Bani Adam (SA-01), Stoic oikeiosis/cosmopolitanism, Golden-Rule traditions]
    note: SA-01 is FLAG FOR MERGE with the Near-Eastern report's Saadi material
  - claim: Contentment as wealth
    with: [Saadi (SA-03), Stoic/Epicurean "enough" ethics]
    note: SA-03 is FLAG FOR MERGE with the Near-Eastern report's Saadi material
tensions:
  - tension: Free will vs fatalism within one cultural sphere
    sides: ZO-01 explicit rejection of predestination vs FE-02, KH-03, MU-02 fatalist strains; present both, do not resolve
  - tension: Carpe-diem hedonism vs ethical striving
    sides: KH-01/KH-04 present-pleasure vs ZO-04/SA-01 moral-project answers to mortality
  - tension: Legacy vs present-moment as responses to death
    sides: FE-04 poetic immortality vs KH-04 today-is-all-we-have
  - tension: Passion as destruction vs passion as divine ideal, within Nizami himself
    sides: Majnun as cautionary self-destruction vs Sufi reading of frenzy as divine intoxication (NI-02)
leads:
  - Hintze, A Zoroastrian Liturgy (2007) — verbatim Y35.2 for the humata/hukhta/hvarshta formula (ZO-04)
  - Insler, The Gathas of Zarathustra (1975), physical volume — full Y31.8 (ZO-05); confirm Y30.2/30.4 against print
  - Davis, Shahnameh (2006) — exact wording + pages for FE-01, FE-02, FE-04
  - Arberry, The Seven Odes (1957) — scholarly verbatim for Zuhayr (MU-01–04) to replace PD 1917 renderings
  - Cole (2020) and Avery & Heath-Stubbs (1979) — per-quatrain literal comparison to FitzGerald for KH-01–05
  - Encyclopaedia Iranica entries "GATHAS", "HUMATA HŪXTA HUVARŠTA", "ŠĀH-NĀMA" — peer-reviewed grounding
  - Boyce, Textual Sources (1984) and Zoroastrians (1979) — free-will-cornerstone framing
  - Ghazanfari, Perceptions of Zoroastrian Realities in the Shahnameh (2011) — whether Shahnameh fatalism is inherited or Ferdowsi's own (bears on fate-vs-will fork framing)
  - Davis, Gulistan (2002) and Faces of Love — scholarly Saadi wording (SA-01, SA-03)
  - Wolpé, Conference of the Birds (2017) — alternative verbatim for Simorgh climax (AT-01) and seven valleys (AT-02)
  - Extend the Barks-"Rumi" / Ladinsky-"Hafiz" misattribution quarantine from the Near-Eastern report; require Yasna numbers for any "Zoroaster" quote and edition citations for any FitzGerald quatrain
notes: >-
  Every famous English Khayyam line is FitzGerald's Victorian recomposition ("transmogrification"),
  and the Persian quatrains are largely pseudepigraphic — credit FitzGerald as crafter, never assert
  Khayyam wrote a given quatrain. Paraphrase retirement queue before publication: FE-02, FE-04, NI-02,
  AT-01, AT-02, MU-04 must be verified against print editions (Leads 1–4) before any appears as a
  verbatim quote. Ferdowsi was a Muslim preserving a Zoroastrian worldview — Shahnameh "Zoroastrian"
  material is filtered through 10th-century Islamic authorship and is not a primary Zoroastrian source.
