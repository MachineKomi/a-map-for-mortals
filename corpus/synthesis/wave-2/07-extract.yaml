dilemmas:
  - name: Ends vs means
    tension: Machiavelli (Prince 18, cruelty well-used) and Kautilya (danda, law of the fish) vs Hippocratic oath's hard line; means-flexibility buys short-term efficacy at the cost of trust erosion (Athens' ultimate defeat; Machiavelli's own warning against being hated)
  - name: Cunning vs integrity
    tension: Sun Tzu, Gracián, Prince-Machiavelli vs Galen, Hippocrates, Discourses-Machiavelli; La Rochefoucauld/Bacon held elsewhere — wire, don't re-extract
  - name: Prudence vs principle
    tension: Gracián's prudencia (adapt to circumstance, no fixed moral generalisations) vs Galen's principle-first ethics — the anti-Gracián
  - name: Force vs patience
    tension: Sun Tzu "subdue without fighting" and Kautilya upeksha vs the decisive strike (Musashi) and Prince "feared than loved"
  - name: Appearance vs substance
    tension: Gracián 99/130, Machiavelli Prince 18, Sun Tzu deception vs Musashi "do not think dishonestly" and Hippocratic transparency
convergences:
  - claim: Deception / perception-management as foundation of adversarial success
    with: [Sun Tzu deception doctrine, Machiavelli Prince 18 appearances, Gracián maxims 99 and 130]
  - claim: Power-asymmetry realism — near-identical structural logic, independently
    with: [Kautilya sixfold policy, Melian dialogue "strong do what they can"]
  - claim: Win without fighting / patience of the weak
    with: [Sun Tzu subdue-without-fighting, Kautilya upeksha]
  - claim: Skill bounded by character — the realists themselves gesture at the moral counter-pole
    with: [Gracián "wicked will envenoms all excellences", Galen virtue-constitutive-of-expertise, Hippocratic oath]
tensions:
  - tension: Secrecy's moral valence — same practice, opposite justification
    sides: Gracián "write your intentions in cypher" (self-protective, strategic) vs Hippocratic confidentiality (other-protective, fiduciary)
  - tension: Machiavelli against himself — keep as two thinkers, do NOT collapse
    sides: Prince XVII feared-than-loved vs Discourses I.58 people wiser and more constant than a prince; meme-Machiavelli alone would falsify the record
  - tension: Deception vs honesty within the strategist family
    sides: Sun Tzu/Gracián/Prince outward feints vs Musashi "do not think dishonestly" — is inward self-honesty compatible with outward deception? Test
  - tension: The core ends-vs-means clash of the whole map (Hippocratic counter-pole, kept first-class)
    sides: Cruelty "well used" (Prince XVII) and Kautilya danda vs "do good or do no harm" (Epidemics I) — professional ethics binds competence to restraint where strategy prizes advantage
leads:
  - Isolate clean Shamasastry verbatim for Kautilya's four upayas (sama, dana, bheda, danda; Book II / IX) to complete force-vs-persuasion node
  - Gracián maxims 130, 4, 84 — exact Jacobs 1892 PD wording (currently Maurer © or title-only)
  - Machiavelli Discourses I.58 verbatim in Detmold 1882 — key republican counter-unit needs exact PD quote
  - Melian 5.103 "hope" passage — verify exact Crawley wording before publishing
  - Galen Best Physician — locate pre-1929 PD English rendering or cite Greek + Loeb sparingly
  - Han Feizi "two handles" (reward and punishment) — not yet extracted; dedupe against Eastern-wisdom query, then add as Chinese-statecraft complement to danda
  - Lord Chesterfield — check childhood/old-age query hasn't claimed him; bridge from Gracián court-prudence to modern professional conduct
  - La Rochefoucauld and Bacon — held in moralists report; wire cunning-vs-integrity fork to existing units, don't re-extract
notes: >-
  Misattribution watchlist is load-bearing: "keep your friends close and your enemies closer" is
  The Godfather Part II (1974), not Sun Tzu (ditto Clavell's Shōgun "bodies float by"); "the ends
  justify the means" appears nowhere in Machiavelli — the Latin cognate exitus acta probat is Ovid,
  Heroides II.85; "primum non nocere" is not in the Hippocratic corpus (genuine source Epidemics I,
  "to do good or to do no harm" — help first), the axiom being attributed to Sydenham but traced in
  print only to c.1860 via Hooker 1847/Chomel (Smith 2005). Copyright flags: Musashi (Harris 1974)
  and Galen (Singer/Loeb) translations in © — paraphrase or short fragments only; PD anchors are
  Giles 1910, Shamasastry 1915, Crawley 1874, Jacobs 1892, Marriott/Ricci, Detmold 1882, Adams 1849.
  Realpolitik units marked cautionary/descriptive, never endorsed; Melian line is a character-position.
