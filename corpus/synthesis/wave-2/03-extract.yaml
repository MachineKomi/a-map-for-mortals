dilemmas:
  - name: Stewardship vs use
    tension: Take only what is given (Honorable Harvest, birgejupmi, ayni with Pachamama) vs extraction/accumulation/ownership
  - name: Individual vs collective-and-land
    tension: Personhood embedded in kin AND land (Mitákuye Oyás'iŋ, whakapapa, ayllu, siida) vs the atomised individual property-holder
  - name: Tradition vs change
    tension: Living adaptation (IQ in modern governance; Te Awa Tupua in statute; sumak kawsay in constitutions) vs reification/relic-making
  - name: Coexistence vs domination
    tension: Two Row Wampum's parallel non-interference vs "steering the other's vessel"
  - name: Sacred/restricted knowledge vs open sharing
    tension: Consent and context (Diné winter stories; the Dreaming) vs extraction/appropriation
convergences:
  - claim: Reciprocity/relationality cluster — HYPOTHESIS, not asserted
    with: [Andean ayni, Sámi láhi/attáldat, Potawatomi Honorable Harvest, Lakota Mitákuye Oyás'iŋ, African ubuntu (parallel query)]
    status: candidate_convergence — test whether genuine independent convergence or analytic over-generalisation imposed by outsiders; recurrence ≠ proof
  - claim: Intergenerational responsibility — HYPOTHESIS, not asserted
    with: [Haudenosaunee seven-generation ethic, Māori mō ngā uri whakatipu, intergenerational-ethics material elsewhere in graph]
    status: candidate_convergence — flag as hypothesis pending independent primary sources from ≥3 peoples plus Indigenous-scholar affirmation per tradition
  - claim: Land as kin/ancestor, not property — strong candidate but metaphysics differ sharply by people
    with: [Haudenosaunee, Lakota, Māori whenua/Te Awa Tupua, Aboriginal Country, Andean Pachamama, Sámi meahcci]
    status: candidate_convergence — recurring but NOT universal; hold Krech counter-case attached
tensions:
  - tension: Relational-holism claims vs Krech counter-evidence
    sides: Land-as-kin stewardship tendency vs Krech (The Ecological Indian, 1999) evidence that specific peoples altered and sometimes over-exploited environments; tendencies not destinies — retain as counter-evidence against "ecological Indian" essentialism
  - tension: Anthropocentric vs relational reading of "he tangata"
    sides: Popular reading (people are the most important thing) vs Hana Tapiata's dissent that within te ao Māori, centring land and whakapapa, "It is not people… It is connection, it is life"
  - tension: Sumak kawsay — ancient concept vs 1990s systematisation
    sides: Enshrined as ancestral Kichwa "good living" (Ecuador 2008) vs Cuestas-Caza, the Whittens, and Gudynas — sumak kawsay ≠ buen vivir; systematised/neologised by Indigenous organisations (OPIP, Pastaza) in the 1990s; some critics allege "invention of tradition"
  - tension: Oral tradition vs written artifact (Two Row Wampum)
    sides: Oral tradition and belt's meaning well attested and revered vs disputed authenticity of later written versions (the Tawagonshi document); keep distinct in the graph
  - tension: Pan-Dreaming homogeneity vs per-nation variation
    sides: Single English "Dreaming" gloss (Gillen/Stanner) vs Warlpiri Jukurrpa and divergent Arrernte, Tiwi, Wiradjuri conceptions (past reality vs concurrent past/present/future)
leads:
  - Gaski (ed.), Time Is a Ship That Never Casts Anchor (2006) — verbatim sourced Sámi proverbs with page numbers (thinnest sourced area)
  - Parker, The Constitution of the Five Nations (1916, public domain) — cross-check against Onondaga Nation community sources
  - Kimmerer, Braiding Sweetgrass (2013) — Honorable Harvest chapter for exact protocol wording (in copyright)
  - Kuokkanen, Reshaping the University (2007) and Boaris dego eana (2009)
  - Furtwangler, Answering Chief Seattle (1997); Gifford, The Many Speeches of Chief Seattle (2015) — definitive textual history
  - Krech, The Ecological Indian (1999) — hold as counter-evidence node
  - Te Ara Encyclopedia of New Zealand (Te Ahukaramū Charles Royal entries) — Māori-authored reference
  - Government of Nunavut, Incorporating Inuit Societal Values (2013); Karetak/Tagalik/Tester (2017)
  - Oskal, Rangifer 20 (2000); Joks/Østmo/Law, Sociological Review 68(2) (2020)
  - Recruit an Indigenous reviewer per tradition before book/website release; tag in-copyright sources (Stanner, Kahn-John, Kuokkanen, Karetak et al.) and quote minimally
notes: >-
  Misattribution watchlist: the popular Chief Seattle speech is APOCRYPHAL (ecological lines by
  Ted Perry, 1972 film Home; 1855 Pierce "letter" unhistorical; even Smith's 1887 transcript is a
  filtered 33-years-later reconstruction); "we borrow the earth from our children" is a 1970s
  environmentalist coinage (QI tentatively Wendell Berry 1971), NOT Native American; the expanded
  "Mitakuye Oyasin prayer" is a modern devotional composition; unattributed online "Sámi proverbs"
  and generic "Native American proverbs" are DUBIOUS unless tied to a named person or text. The
  seventh-generation slogan is a real Haudenosaunee ethic but NOT a verbatim Great Law quotation —
  flag as tradition/paraphrase (only "seven" passage concerns leaders' skin "seven spans" thick).
  CARE/consent gate: care-flag units (Diné winter stories, Dreaming specifics) are record-only —
  never extract or publish content; consent-gate units require a consent audit or an established
  public community-authored source (Onondaga Nation, Te Ara, Govt of Nunavut) before publication.
  No pan-Indigenous essentialism — every generalisation is a tendency across specific named
  peoples; translation loss is real (Mitákuye Oyás'iŋ, meahcci, sumak kawsay, the Dreaming all
  resist English glossing). New domain tags minted for this report: nature, community, legacy, family.
