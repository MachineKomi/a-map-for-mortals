dilemmas:
  - name: Engagement vs withdrawal
    tension: Confucian role-duty and Gita 2.47's call to act vs Zhuangzi's useless tree and Kenko's hermit ideal — engagement builds social goods but courts entanglement/burnout; withdrawal preserves integrity/peace but risks irrelevance
  - name: Effort vs acceptance
    tension: Xunzi cultivation, Katha razor's edge, DDJ 64 persistence vs wu-wei (DDJ 37) and acceptance of impermanence (Kenko, mono no aware) — striving achieves but generates anxiety; acceptance yields peace but can shade into passivity
  - name: Desire vs non-attachment
    tension: Four Noble Truths, Yoga Sutras 1.2/1.12, Isha 1 vs ordinary desire and Han Feizi's frank reliance on desire — non-attachment reduces suffering (prudential) but its soteriological payoff (nibbana/moksha) is metaphysical
  - name: Self-cultivation vs spontaneity
    tension: The headline Confucian-Daoist fork — building character through ritual/learning vs unblocking natural flow; both quotable to section/verse, neither refutes the other
  - name: Duty to family/lord vs duty to truth/others
    tension: Confucian graded love and Hagakure lord-loyalty vs Mohist impartial concern and Buddhist universal compassion — kin-priority sustains relationships but licenses nepotism; impartiality fairer but humanly harder
