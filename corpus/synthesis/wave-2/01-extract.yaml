notes: >-
  Misattribution is the report's single largest data-integrity risk: run every candidate quote through
  fakebuddhaquotes.com / taoistic.com / primary editions; 9-item watchlist includes hard fakes ("student
  ready, teacher appears", "mind is everything", Vivekananda's "Arise, awake..." paraphrase, Einstein-Buddhism,
  Confucius fortune-cookie lines) and misframings (Hagakure as "the bushido code" — a Meiji/20th-c. invented
  tradition per Benesch; DDJ 64 genuine Laozi but misattributed to Confucius). Translation is interpretation:
  Legge Christianises, Müller predates modern philology, Pope moralizes, Buddharakkhita inserts "all";
  contested renderings flagged for tat tvam asi (Brereton/Olivelle), Isha 1, neti neti. Probable-pending:
  Nagarjuna, Dogen (wordings unverified this pass — quarantine until edition check) and Kural (couplet unpinned);
  drop rather than downgrade if edition checks fail. Keep claim types separate: karma/rebirth/nibbana metaphysical,
  tranquility payoffs prudential/observational; character speech (Krishna, Zhuangzi parables) is not flat endorsement.
