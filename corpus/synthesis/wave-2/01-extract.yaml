tensions:
  - tension: Human nature good vs bad (unresolved within Confucianism)
    sides: Mencius (innate four sprouts, 2A6) vs Xunzi (nature evil/detestable, ch. 23; minority reading "uncarved, not evil" — Tang Siufu)
  - tension: Effortful cultivation vs wu-wei (the headline fork)
    sides: Confucian xiushen/li/role-duty vs Daodejing 37/48 and Zhuangzi naturalness — genuinely opposed prescriptions
  - tension: Duty to act vs non-harm
    sides: Gita's call to act even in war vs Buddhist/Jain ahimsa and withdrawal
  - tension: Do rewards/punishments or virtue produce order?
    sides: Han Feizi's amoral two-handles statecraft vs Confucian virtue-rule and the Kural's moral (but pragmatic, consequentialist) statecraft
  - tension: Scope of moral concern
    sides: Confucian graded/filial love vs Mohist impartial care vs Buddhist universal compassion
