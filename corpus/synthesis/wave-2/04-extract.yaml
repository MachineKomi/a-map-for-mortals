notes: >-
  Copyright wall on the 20th-century core: Beauvoir, Murdoch, Midgley, Gilligan, Noddings and the
  major modern translations (Carson, Tyler, Morris/McKinney, Ramanujan, Helle) are in-copyright —
  store claim + citation, paraphrase or <=25-word snippets pending rights review; the PD-safe quotable
  spine is Enheduanna(text), Wharton-Sappho, Zenos-Hypatia, Warrack-Julian, Peers-Teresa, Astell,
  Wollstonecraft, Fuller. Misattribution watchlist: "well-behaved women" is Ulrich 1976 (not Monroe/
  Roosevelt); most circulating "Rabia poems" are Ladinsky-style apocrypha (only the fear/hope prayer
  well-attested via Attar); "mono no aware" is Motoori Norinaga's term, not Murasaki's; Teresa's
  "Christ has no body now but yours" is disputed; Synesius-on-Hypatia lines unverified without Fitzgerald.
