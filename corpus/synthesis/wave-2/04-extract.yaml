dilemmas:
  - name: Care vs justice
    tension: Relational/contextual responsiveness (Gilligan, Noddings) vs impartial rights and equality (Friedman, Kantian critics) — CONTESTED, not settled; do not gender-code
  - name: Voice vs silence
    tension: Speaking/writing publicly at real risk (Enheduanna, Hypatia, Fuller, Astell) vs safety in silence or coded speech (Ban Zhao's yielding, de Pizan's strategic dilution)
  - name: Autonomy vs relation
    tension: Self-possession and independence (Wollstonecraft, Beauvoir, Astell) vs constitution-through-relationship (Noddings, the mystics' union/self-loss); Murdoch bridges — autonomy through attending to the other's reality
  - name: Instrumental vs non-instrumental devotion
    tension: Acting for reward/fear vs for the good/God's own sake (conventional piety vs Rabia, Julian, Akka Mahadevi, Murdoch's unselfing)
  - name: The examined life under constraint
    tension: Pursuing wisdom/vocation when law, marriage, or custom forbids it (Hypatia, de Pizan, Astell, Sei Shonagon, Akka Mahadevi)
convergences:
  - claim: Non-instrumental orientation to the ultimate
    with: [Rabia (Sufi), Julian (Christian), Akka Mahadevi (Bhakti), Murdoch (secular Platonist)]
    note: Test whether claim types are commensurable (metaphysical for mystics, normative/prudential for Murdoch) — do not flatten into one node
  - claim: Attention/unselfing as the ground of virtue
    with: [Murdoch, Weil (held by modern-philosophy report), Sei Shonagon's aesthetic discrimination, Teresa's recollection]
    note: "FLAG FOR MERGE with modern-philosophy report's Weil 'attention' unit — take Murdoch only for what the Weil unit omits"
  - claim: Education as the lever of equality
    with: [Ban Zhao (Han), de Pizan (medieval French), Astell, Wollstonecraft (English)]
    note: Striking independent convergence across 1,700 years
tensions:
  - tension: Care-as-female-strength vs care-should-be-de-gendered
    sides: Gilligan/Noddings articulate a "different voice" of care vs Friedman (Beyond Caring, 1987) — care and justice do not divide along gender lines; essentialism/"slave morality" charges; Gilligan's 1987 reply places care within a justice framework. Do not resolve.
  - tension: Autonomy/independence vs self-loss in union
    sides: Wollstonecraft, Beauvoir (self-governance) vs the mystics' union and self-loss — genuine value conflict
  - tension: Ban Zhao's submission-teaching vs her education-advocacy
    sides: A contradiction within one author; Nujie preaches humility/yielding yet argues for girls' education
  - tension: Beauvoir's constructed-"woman" vs essentialist readings of care ethics
    sides: Potential internal tension in the female-wisdom corpus itself
